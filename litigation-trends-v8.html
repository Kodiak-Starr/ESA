// ── INLINE SVG CHART REPLACEMENTS (no Recharts needed) ───────────────────────

function SvgBarChart({ data, color, height = 110, labelKey = "y" }) {
  const [tooltip, setTooltip] = useState(null);
  const max = Math.max(...data.map(d => d.n), 1);
  const padL = 4, padR = 4, padT = 6, padB = 18;
  const W = 280, H = height;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const barW = (chartW / data.length) * 0.6;
  const gap   = (chartW / data.length) * 0.4;
  // Show every other label when there are many bars
  const showLabel = (i) => data.length <= 6 ? true : i % 2 === 0;

  return (
    <div style={{ position:"relative", width:"100%", userSelect:"none" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height, display:"block" }}>
        {data.map((d, i) => {
          const bh = Math.max((d.n / max) * chartH, 2);
          const x  = padL + i * (barW + gap) + gap / 2;
          const y  = padT + chartH - bh;
          return (
            <g key={i}
               onMouseEnter={() => setTooltip({ i, x: x + barW / 2, y, n: d.n, label: d[labelKey] })}
               onMouseLeave={() => setTooltip(null)}
               style={{ cursor:"pointer" }}>
              <rect x={x} y={y} width={barW} height={bh}
                    fill={tooltip && tooltip.i === i ? color : color + "cc"}
                    rx="2" ry="2"/>
              <text x={x + barW / 2} y={H - 4}
                    textAnchor="middle" fontSize="7" fill={C.slateL} fontFamily={FB}>
                {showLabel(i) ? d[labelKey] : ""}
              </text>
            </g>
          );
        })}
        <line x1={padL} y1={padT + chartH} x2={W - padR} y2={padT + chartH}
              stroke={C.border} strokeWidth="0.5"/>
      </svg>
      {tooltip && (
        <div style={{
          position:"absolute", pointerEvents:"none",
          top: Math.max(0, (tooltip.y / height) * 100) + "%",
          left: Math.min(80, (tooltip.x / 280) * 100) + "%",
          transform:"translate(-50%, -110%)",
          background:C.white, border:`1px solid ${C.border}`,
          borderRadius:6, padding:"5px 9px",
          fontFamily:FB, fontSize:14, boxShadow:"0 2px 8px rgba(0,0,0,0.1)",
          whiteSpace:"nowrap", zIndex:10,
        }}>
          <span style={{ fontWeight:600, color:C.navy }}>{tooltip.label}</span>
          {" — "}
          <span style={{ color }}>{tooltip.n} cases</span>
        </div>
      )}
    </div>
  );
}

function SvgDonutChart({ data, colors, size = 130 }) {
  const [hovered, setHovered] = useState(null);
  const total = data.reduce((s, d) => s + d.n, 0);
  if (!total) return null;
  const cx = size / 2, cy = size / 2;
  const outerR = size * 0.44, innerR = size * 0.26;

  let angle = -Math.PI / 2;
  const slices = data.map((d, i) => {
    const sweep = (d.n / total) * 2 * Math.PI;
    const a1 = angle, a2 = angle + sweep;
    angle += sweep;
    const large = sweep > Math.PI ? 1 : 0;
    const x1 = cx + outerR * Math.cos(a1), y1 = cy + outerR * Math.sin(a1);
    const x2 = cx + outerR * Math.cos(a2), y2 = cy + outerR * Math.sin(a2);
    const x3 = cx + innerR * Math.cos(a2), y3 = cy + innerR * Math.sin(a2);
    const x4 = cx + innerR * Math.cos(a1), y4 = cy + innerR * Math.sin(a1);
    return {
      path:`M${x1} ${y1} A${outerR} ${outerR} 0 ${large} 1 ${x2} ${y2} L${x3} ${y3} A${innerR} ${innerR} 0 ${large} 0 ${x4} ${y4}Z`,
      color: colors[i % colors.length], name: d.name, n: d.n,
    };
  });

  return (
    <div style={{ position:"relative", display:"inline-block" }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {slices.map((s, i) => (
          <path key={i} d={s.path}
                fill={hovered === i ? s.color : s.color + "dd"}
                stroke={C.white} strokeWidth="1"
                style={{ cursor:"pointer", transition:"fill 0.15s" }}
                onMouseEnter={() => setHovered(i)}
                onMouseLeave={() => setHovered(null)}/>
        ))}
      </svg>
      {hovered !== null && (
        <div style={{
          position:"absolute", top:"50%", left:"50%",
          transform:"translate(-50%,-50%)",
          textAlign:"center", pointerEvents:"none",
        }}>
          <div style={{ fontFamily:FD, fontWeight:700, fontSize:14, color:C.navy, lineHeight:1 }}>
            {slices[hovered].n}
          </div>
          <div style={{ fontFamily:FB, fontSize:14, color:C.slateL, lineHeight:1.3, maxWidth:50 }}>
            {slices[hovered].name}
          </div>
        </div>
      )}
    </div>
  );
}

function PolicyStatus({ status, note }) {
  const s = STATUS_CONFIG[status];

      </div>

  );
}

// ── TOOLTIP WRAPPER ───────────────────────────────────────────────────────────
function Tip({ children, label = "Explore cases" }) {
  const [pos, setPos] = useState(null);
  return (
    <div style={{ display:"contents" }}
      onMouseEnter={e => setPos({ x:e.clientX, y:e.clientY })}
      onMouseMove={e  => setPos({ x:e.clientX, y:e.clientY })}
      onMouseLeave={() => setPos(null)}>
      {children}
      {pos && (
        <div style={{
          position:"fixed", left:pos.x + 14, top:pos.y - 40,
          zIndex:9999, background:"#0e2240", color:"white",
          fontFamily:FB, fontSize:12, fontWeight:600,
          padding:"5px 11px", borderRadius:6,
          pointerEvents:"none", whiteSpace:"nowrap",
          boxShadow:"0 3px 10px rgba(0,0,0,0.3)",
          display:"flex", alignItems:"center", gap:5,
        }}>
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
            <path d="M5 2H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V7"/>
            <polyline points="8 1 11 1 11 4"/><line x1="5.5" y1="6.5" x2="11" y2="1"/>
          </svg>
          {label}
        </div>
      )}
    </div>
  );
}

function AppDistSplit({ appellate, district, color, openPanel, clusterId }) {
  const total = appellate + district;
  const aPct  = Math.round(appellate / total * 100);
  function getCases(level) {
    const cl = PANEL_COURT_LEVEL_BY_CLUSTER[clusterId];
    return cl ? cl[level] || [] : [];
  }
  function handleAppellate() { openPanel && openPanel("Appellate cases", getCases("appellate"), `${appellate} cases at appellate level`, color); }
  function handleDistrict()  { openPanel && openPanel("District court cases", getCases("district"), `${district} cases at district level`, color+"88"); }
  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
        <span style={{ fontFamily:FB, fontSize:14, color:C.slateL }}>Court level split</span>
        <span style={{ fontFamily:FB, fontSize:14, color:C.slateL }}>{total} cases</span>
      </div>
      <div style={{ height:10, background:C.smoke, borderRadius:5, display:"flex", overflow:"hidden", marginBottom:6 }}>
        <Tip label="Explore cases">
          <div onClick={handleAppellate}
               style={{ width:`${aPct}%`, background:color, borderRadius:"5px 0 0 5px", cursor: openPanel ? "pointer" : "default", transition:"opacity 0.15s" }}
               onMouseEnter={e => e.currentTarget.style.opacity=".75"} onMouseLeave={e => e.currentTarget.style.opacity="1"} />
        </Tip>
        <Tip label="Explore cases">
          <div onClick={handleDistrict}
               style={{ width:`${100-aPct}%`, background:color+"55", borderRadius:"0 5px 5px 0", cursor: openPanel ? "pointer" : "default", transition:"opacity 0.15s" }}
               onMouseEnter={e => e.currentTarget.style.opacity=".75"} onMouseLeave={e => e.currentTarget.style.opacity="1"} />
        </Tip>
      </div>
      <div style={{ display:"flex", justifyContent:"space-between" }}>
        <Tip label="Explore cases">
          <div style={{ display:"flex", alignItems:"center", gap:5, cursor: openPanel ? "pointer" : "default" }}
               onClick={handleAppellate}>
            <div style={{ width:8, height:8, borderRadius:2, background:color }} />
            <span style={{ fontFamily:FB, fontSize:14, color:C.slate }}>Appellate: <strong>{appellate}</strong> ({aPct}%)</span>
          </div>
        </Tip>
        <Tip label="Explore cases">
          <div style={{ display:"flex", alignItems:"center", gap:5, cursor: openPanel ? "pointer" : "default" }}
               onClick={handleDistrict}>
            <div style={{ width:8, height:8, borderRadius:2, background:color+"55" }} />
            <span style={{ fontFamily:FB, fontSize:14, color:C.slate }}>District: <strong>{district}</strong> ({100-aPct}%)</span>
          </div>
        </Tip>
      </div>
    </div>
  );
}

// Filing Activity Card — unified across all views
function FilingActivityCard({ data, yearData, color, total, label, openPanel }) {
  const [mode, setMode] = useState(yearData && yearData.length ? 'year' : 'month');
  const months = data || [];
  const years  = yearData || [];
  const activeData = mode === 'year' ? years : months;
  const maxN   = Math.max(...activeData.map(d => d.n), 1);
  const sum    = activeData.reduce((s, d) => s + d.n, 0);
  return (
    <Card>
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:6 }}>
        <div>
          <SL color={color}>Filing activity</SL>
          <CT>New Cases Filed</CT>
        </div>
        {months.length > 0 && years.length > 0 && (
          <div style={{ display:"flex", gap:4, flexShrink:0 }}>
            {['year','month'].map(m => (
              <button key={m} onClick={() => setMode(m)}
                style={{ fontFamily:FB, fontSize:11, fontWeight:600, padding:"3px 8px", borderRadius:6,
                         border:`1px solid ${mode===m ? color : C.borderD}`,
                         background:mode===m ? color : "transparent",
                         color:mode===m ? C.white : C.slateL, cursor:"pointer" }}>
                {m === 'year' ? 'By year' : 'By month'}
              </button>
            ))}
          </div>
        )}
      </div>
      <div style={{ display:"flex", alignItems:"baseline", gap:10, margin:"8px 0 12px" }}>
        <div style={{ fontFamily:FD, fontWeight:700, fontSize:36, color:color, lineHeight:1 }}>{total || sum}</div>
        <div style={{ fontFamily:FB, fontSize:14, color:C.slateL }}>{label || "total cases"}</div>
      </div>
      {activeData.length > 0 && (
        <div style={{ display:"flex", gap: mode==='year' ? 6 : 4, alignItems:"flex-end", height:52 }}>
          {activeData.map((d, i) => {
            const isLatest = i === activeData.length - 1;
            const barH = Math.max(Math.round((d.n / maxN) * 40), 2);
            const key  = mode === 'year' ? d.y : d.m;
            return (
              <Tip key={key||i} label="Explore cases">
              <div
                onClick={() => openPanel && openPanel(
                  mode === 'year' ? `Cases filed in ${key}` : `Cases filed · ${key}`,
                  [],
                  `${d.n} new cases · click to browse`,
                  color
                )}
                style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2, cursor: openPanel ? "pointer" : "default" }}
                onMouseEnter={e => { if(openPanel) e.currentTarget.querySelector('div:nth-child(2)').style.opacity='0.75'; }}
                onMouseLeave={e => { if(openPanel) e.currentTarget.querySelector('div:nth-child(2)').style.opacity='1'; }}>
                <div style={{ fontFamily:FD, fontWeight:700, fontSize:11, color:isLatest?color:C.borderD, lineHeight:1 }}>
                  {d.n > 0 ? d.n : ""}
                </div>
                <div style={{ width:"100%", height:`${barH}px`, background:isLatest?color:color+"55", borderRadius:"2px 2px 0 0", transition:"height 0.3s ease, opacity 0.15s" }}/>
                <div style={{ fontFamily:FB, fontSize:10, color:C.slateL, whiteSpace:"nowrap" }}>
                  {mode === 'year' ? String(key).replace('20','\'') : key}
                </div>
              </div>
              </Tip>
            );
          })}
        </div>
      )}
    </Card>
  );
}

// Plaintiff by Type Card — unified horizontal bars
function PlaintiffTypeCard({ data, color, openPanel, clusterId }) {
  const items  = (data || []).slice(0, 7);
  const maxN   = Math.max(...items.map(d => d.n), 1);
  const [hov, setHov] = useState(null);
  const COLORS = [color, C.blue, C.purple, C.amber, C.green, C.red, C.teal];
  function handleClick(d) {
    if (!openPanel) return;
    const clusterCases = clusterId && PANEL_CASES_BY_CLUSTER[clusterId];
    const cases = clusterCases && clusterCases.plaintiff && clusterCases.plaintiff[d.name] || [];
    openPanel(`${d.name}`, cases, `${d.n} cases · Plaintiff type`, color);
  }
  return (
    <Card>
      <SL color={color}>Who's suing</SL>
      <CT>Plaintiff by Type</CT>
      <div style={{ display:"flex", flexDirection:"column", gap:7, marginTop:10 }}>
        {items.map((d, i) => {
          const pct = Math.round((d.n / maxN) * 100);
          const col = COLORS[i % COLORS.length];
          const isHov = hov === i;
          return (
            <Tip key={i} label="Explore cases">
              <div
                onMouseEnter={() => setHov(i)} onMouseLeave={() => setHov(null)}
                onClick={() => handleClick(d)}
                style={{ cursor:"pointer" }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                  <span style={{ fontFamily:FB, fontSize:13, color: isHov ? color : C.navy, fontWeight:isHov?700:400, transition:"color 0.15s" }}>{d.name}</span>
                  <span style={{ fontFamily:FD, fontWeight:700, fontSize:13, color:col }}>{d.n}</span>
                </div>
                <div style={{ height:5, background:C.smoke, borderRadius:3 }}>
                  <div style={{ height:"100%", width:`${pct}%`, background:isHov?color:col, borderRadius:3, transition:"background 0.15s, width 0.3s" }}/>
                </div>
              </div>
            </Tip>
          );
        })}
      </div>
    </Card>
  );
}

// Appointing President Card — updates with issue/subtopic filter
function AppointingPresidentCard({ color, baseData, scale, openPanel, clusterId }) {
  // baseData: array of {pres,n,party,col}; scale: fraction to apply (for issue/subtopic)
  const raw  = baseData || [
    { pres:"Obama",n:46,party:"D",col:"#1a56db"},{pres:"Biden",n:37,party:"D",col:"#3b82f6"},
    { pres:"Trump",n:32,party:"R",col:"#dc2626"},{pres:"G.W. Bush",n:21,party:"R",col:"#ef4444"},
    { pres:"Clinton",n:13,party:"D",col:"#60a5fa"},{pres:"Reagan",n:7,party:"R",col:"#fca5a5"},
  ];
  const factor = (scale !== undefined && scale !== null) ? scale : 1;
  const data = raw.map(d => ({ ...d, n: Math.max(1, Math.round(d.n * factor)) }));
  const maxN = Math.max(...data.map(d => d.n), 1);
  const total = data.reduce((s,d) => s+d.n, 0);
  return (
    <Card>
      <SL color={color}>Judicial composition</SL>
      <CT>Cases by Appointing President</CT>
      <Mu style={{ marginBottom:12 }}>{total} cases with known judge assignment</Mu>
      {data.map((d, i) => (
        <Tip key={i} label="Explore cases">
        <div style={{ marginBottom:8, cursor: openPanel?"pointer":"default" }}
          onClick={() => {
            if (!openPanel) return;
            const clustCases = clusterId && PANEL_JUDICIAL_BY_CLUSTER[clusterId] && PANEL_JUDICIAL_BY_CLUSTER[clusterId][d.pres] || [];
            openPanel(`Judges appointed by ${d.pres}`, clustCases, `${d.n} active cases before ${d.pres}-appointed judges`, d.col);
          }}
          onMouseEnter={e => { if(openPanel){ const b=e.currentTarget.querySelector('span:last-child'); if(b) b.style.fontWeight='900'; }}}
          onMouseLeave={e => { if(openPanel){ const b=e.currentTarget.querySelector('span:last-child'); if(b) b.style.fontWeight='700'; }}}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:3 }}>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <span style={{ fontFamily:FB, fontSize:10, fontWeight:700, color:"white", background:d.col, borderRadius:4, padding:"1px 5px", flexShrink:0 }}>{d.party}</span>
              <span style={{ fontFamily:FB, fontSize:13, color:C.navy }}>{d.pres}</span>
            </div>
            <span style={{ fontFamily:FD, fontWeight:700, fontSize:13, color:d.col, transition:"font-weight 0.1s" }}>{d.n}</span>
          </div>
          <div style={{ height:5, background:C.smoke, borderRadius:3 }}>
            <div style={{ height:"100%", width:`${Math.round((d.n/maxN)*100)}%`, background:d.col, borderRadius:3, transition:"width 0.4s ease" }}/>
          </div>
        </div>
        </Tip>
      ))}
    </Card>
  );
}

function GeoMap({ courts, color, openPanel, clusterId }) {
  const [hovered, setHovered] = useState(null);

  const activeStates = new Set(
    courts.flatMap(c => COURT_TO_STATES[c] || [])
  );

  function handleDotClick(abbr) {
    if (!openPanel) return;
    const cases = PANEL_CASES_BY_GEO[abbr] || [];
    const matchedCourts = courts.filter(c => (COURT_TO_STATES[c] || []).includes(abbr));
    openPanel(`Cases filed in ${abbr}`, cases, matchedCourts.join(" · "), color);
  }

  return (
    <div style={{ position:"relative", width:"100%", paddingBottom:"60%", background:"#f0f4f8", borderRadius:8, border:`1px solid ${C.border}`, overflow:"hidden" }}>
      <svg viewBox="0 0 280 168" style={{ position:"absolute", top:0, left:0, width:"100%", height:"100%" }} preserveAspectRatio="xMidYMid meet">
        <path d={US_PATH} fill="#e4eaf3" stroke="#c5d0df" strokeWidth="0.8"/>
        {Object.entries(STATE_POSITIONS).map(([abbr, pos]) => {
          const isActive = activeStates.has(abbr);
          const isHov    = hovered === abbr;
          return (
            <g key={abbr}
               onMouseEnter={() => setHovered(abbr)}
               onMouseLeave={() => setHovered(null)}
               onClick={() => isActive && handleDotClick(abbr)}
               style={{ cursor: isActive ? "pointer" : "default" }}>
              <circle
                cx={pos.x} cy={pos.y}
                r={isActive ? (isHov ? 6.5 : 5.5) : 2.8}
                fill={isActive ? color : "#bec9d8"}
                stroke={isActive ? "rgba(255,255,255,0.85)" : "none"}
                strokeWidth="1.2"
                opacity={isActive ? 1 : 0.5}
                style={{ transition:"r 0.12s" }}
              />
              {isActive && (
                <text x={pos.x} y={pos.y + 9.5}
                      textAnchor="middle" fontSize="4.5"
                      fill={color} fontFamily={FB} fontWeight="700"
                      opacity="0.85">
                  {abbr}
                </text>
              )}
            </g>
          );
        })}
      </svg>
      {hovered && activeStates.has(hovered) && (() => {
        const matchedCourts = courts.filter(c => (COURT_TO_STATES[c] || []).includes(hovered));
        return (
          <div style={{
            position:"absolute", bottom:6, left:8,
            background:"rgba(14,34,64,0.9)", color:"white",
            borderRadius:6, padding:"4px 8px",
            fontFamily:FB, fontSize:14, pointerEvents:"none",
            maxWidth:"80%",
          }}>
            <strong>{hovered}</strong> — {matchedCourts.join(", ")}
            {openPanel && <span style={{opacity:.7}}> · click to explore cases</span>}
          </div>
        );
      })()}
    </div>
  );
}

// ── LANDING OVERVIEW ──────────────────────────────────────────────────────────
function LandingOverview({ onSelect, openPanel }) {
  const allIssues = ISSUE_CLUSTERS.flatMap(c => c.issues.map(i => ({ ...i, cluster:c })));
  const totalCases     = allIssues.reduce((s, i) => s + i.total, 0);
  const totalAppellate = allIssues.reduce((s, i) => s + i.appellate, 0);
  const totalDistrict  = allIssues.reduce((s, i) => s + i.district, 0);
  const blocked   = allIssues.filter(i => i.policyStatus === "blocked").length;
  const contested = allIssues.filter(i => i.policyStatus === "contested").length;

  return (
    <div>
      {/* Overview intro */}
      <div style={{ marginBottom:24 }}>
        <h1 style={{ fontFamily:FD, fontWeight:700, fontSize:28, color:C.navy, margin:"0 0 12px", lineHeight:1.15 }}>Health Care Litigation Trends &amp; Intelligence</h1>
        <p style={{ fontFamily:FB, fontSize:15, color:C.slate, lineHeight:1.7, margin:"0 0 8px", maxWidth:760 }}>
          Health care is one of the most litigated sectors of American policy. This dashboard tracks <strong style={{ color:C.navy }}>{totalCases} active federal cases</strong> across {ISSUE_CLUSTERS.length} issue clusters — from attacks on the ACA to the fight over Medicare drug pricing — giving you a real-time map of where the law is being made, who is suing whom, and which cases are shaping the next chapter of health policy.
        </p>
        <p style={{ fontFamily:FB, fontSize:14, color:C.slateL, lineHeight:1.6, margin:0, maxWidth:740 }}>
          Use the cluster tabs above to drill into a specific area, or explore the trends below to find what matters most to you. Every data point leads to the underlying cases.
        </p>
      </div>

      {/* ═══ MAP with filters ═══ */}
      {(() => {
        const [mapCluster, setMapCluster] = useState("all");
        const [mapIssue,   setMapIssue]   = useState("all");
        const [mapTooltip, setMapTooltip] = useState(null);
        const [tipPos,     setTipPos]     = useState({x:0,y:0});

        // Build filterable state data
        const filteredClusters = mapCluster === "all"
          ? ISSUE_CLUSTERS
          : ISSUE_CLUSTERS.filter(c => c.id === mapCluster);
        const filteredIssues = filteredClusters.flatMap(c =>
          mapIssue === "all" ? c.issues : c.issues.filter(i => i.id === mapIssue)
        );

        const stateData = {};
        filteredClusters.forEach(cluster => {
          const issues = mapIssue === "all" ? cluster.issues : cluster.issues.filter(i => i.id === mapIssue);
          issues.forEach(issue => {
            (issue.courts || []).forEach(court => {
              (COURT_TO_STATES[court] || []).forEach(st => {
                if (!stateData[st]) stateData[st] = { clusters:{}, total:0 };
                stateData[st].clusters[cluster.id] = (stateData[st].clusters[cluster.id] || 0) + issue.total;
                stateData[st].total += issue.total;
              });
            });
          });
        });

        const stateInfo = {};
        Object.entries(stateData).forEach(([st, d]) => {
          const dominant = Object.entries(d.clusters).sort((a,b) => b[1]-a[1])[0];
          const cluster  = ISSUE_CLUSTERS.find(c => c.id === dominant[0]);
          stateInfo[st]  = { color: cluster ? cluster.color : C.navy, total: d.total, clusterLabel: cluster ? cluster.label : "" };
        });
        const maxTotal = Math.max(...Object.values(stateInfo).map(d => d.total), 1);

        const allIssuesFlat = ISSUE_CLUSTERS.flatMap(c => c.issues.map(i => ({...i, cluster:c})));

        return (
          <div style={{ marginBottom:22 }}>
            {/* Map card — full width */}
            <div style={{ background:C.white, border:`1px solid ${C.border}`, borderRadius:14, overflow:"hidden", boxShadow:"0 2px 8px rgba(0,0,0,0.05)", marginBottom:14 }}>
              {/* Header with filters */}
              <div style={{ padding:"12px 18px", borderBottom:`1px solid ${C.smoke}`, display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                <div style={{ flex:1 }}>

function buildAllDates() {
  const MONTH_NUM = { Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12 };
  const rows = [];
  ISSUE_CLUSTERS.forEach(cluster => {
    cluster.issues.forEach(issue => {
      (issue.keyDates || []).forEach(d => {
        const parts = d.date.split(" ");
        const month = MONTH_NUM[parts[0]] || 0;
        const day   = parseInt(parts[1]) || 0;
        const year  = 2026;
        rows.push({ ...d, month, day, year, sortKey: year*10000 + month*100 + day, cluster, issue });
      });
    });
  });
  rows.sort((a,b) => a.sortKey - b.sortKey);
  return rows;
}

  );

function ClusterDashboard({ cluster, onSelectIssue, openPanel }) {
  const [activeIssue, setActiveIssue] = useState("all");
  const [activeSub,   setActiveSub]   = useState("all");

  const issue  = activeIssue !== "all" ? cluster.issues.find(i => i.id === activeIssue) : null;
  const sub    = issue && issue.subTopics ? issue.subTopics.find(s => s.id === activeSub) : null;

  const totalCases    = (activeSub !== "all" && sub) ? sub.n : issue ? issue.total : cluster.issues.reduce((s,i)=>s+i.total,0);
  const totalApp      = issue ? (activeSub !== "all" && sub ? sub.appellate : issue.appellate) : cluster.issues.reduce((s,i)=>s+i.appellate,0);
  const totalDist     = issue ? (activeSub !== "all" && sub ? sub.district  : issue.district)  : cluster.issues.reduce((s,i)=>s+i.district,0);
  const subCount      = issue && issue.subTopics ? issue.subTopics.length : 0;
  const clusterTotal  = cluster.issues.reduce((s,i)=>s+i.total, 0);
  const judicialBase  = JUDICIAL_BY_CLUSTER[cluster.id] || null;
  // Scale drill-down: cluster → issue → subtopic
  const judicialScale = (() => {
    if (activeSub !== "all" && sub && issue) return (sub.n / Math.max(issue.total, 1)) * (issue.total / Math.max(clusterTotal, 1));
    if (issue) return issue.total / Math.max(clusterTotal, 1);
    return 1;
  })();

  const activeCourts  = (sub && sub.courts) ? sub.courts : (issue && issue.courts) ? issue.courts : Array.from(new Set(cluster.issues.flatMap(i=>i.courts||[]))).slice(0,6);
  const activeWhoSues = (sub && sub.whoSues) ? sub.whoSues : (issue && issue.whoSues) ? issue.whoSues : cluster.issues.flatMap(i=>i.whoSues||[]).reduce((acc,p)=>{ const e=acc.find(a=>a.name===p.name); e?e.n+=p.n:acc.push({...p}); return acc; },[]).sort((a,b)=>b.n-a.n).slice(0,6);
  // filedByMonth must be declared before scaledFilingData
  const filedByMonth  = (issue && issue.filedByMonth) ? issue.filedByMonth : (cluster.issues.find(i=>i.filedByMonth) || {}).filedByMonth || [];
  const activeSubTotal = (activeSub !== "all" && sub) ? sub.n : null;
  const scaledFilingData = (filedByMonth.length && activeSubTotal && issue)
    ? filedByMonth.map(d => ({ ...d, n: Math.max(0, Math.round(d.n * (activeSubTotal / issue.total))) }))
    : filedByMonth;

  return (
    <div>
      {/* Header + filters */}
      <div style={{ marginBottom:20 }}>
        <div style={{ fontFamily:FD, fontWeight:700, fontSize:28, color:C.navy, lineHeight:1, marginBottom: cluster.desc ? 8 : 12 }}>{cluster.label}</div>
        {cluster.desc && (
          <p style={{ fontFamily:FB, fontSize:14, color:C.slate, lineHeight:1.7, margin:"0 0 14px", maxWidth:740 }}>
            {cluster.desc}
          </p>
        )}
        {/* Issue pills */}
        <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:10 }}>
          <button onClick={() => { setActiveIssue("all"); setActiveSub("all"); }}
            style={{ fontFamily:FB, fontSize:13, fontWeight:activeIssue==="all"?700:500, padding:"7px 16px", borderRadius:8,
                     border:`2px solid ${activeIssue==="all"?cluster.color:C.borderD}`,
                     background:activeIssue==="all"?cluster.color:C.white, color:activeIssue==="all"?C.white:C.slate,
                     cursor:"pointer", boxShadow:activeIssue==="all"?`0 2px 8px ${cluster.color}40`:"none" }}>
            All issues ({cluster.issues.reduce((s,i)=>s+i.total,0)})
          </button>
          {cluster.issues.map(iss => (
            <button key={iss.id} onClick={() => { setActiveIssue(iss.id); setActiveSub("all"); }}
              style={{ fontFamily:FB, fontSize:13, fontWeight:activeIssue===iss.id?700:500, padding:"7px 16px", borderRadius:8,
                       border:`2px solid ${activeIssue===iss.id?cluster.color:C.borderD}`,
                       background:activeIssue===iss.id?cluster.color:C.white, color:activeIssue===iss.id?C.white:C.slate,
                       cursor:"pointer", boxShadow:activeIssue===iss.id?`0 2px 8px ${cluster.color}40`:"none" }}>
              {iss.label} ({iss.total})
            </button>
          ))}
        </div>
        {/* Sub-topic pills */}
        {issue && issue.subTopics && issue.subTopics.length > 0 && (
          <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center", paddingLeft:4 }}>
            <span style={{ fontFamily:FB, fontSize:12, color:C.slateL, marginRight:4 }}>Sub-topic:</span>
            <button onClick={() => setActiveSub("all")}
              style={{ fontFamily:FB, fontSize:12, fontWeight:activeSub==="all"?600:400, padding:"4px 12px", borderRadius:20,
                       border:`1px solid ${activeSub==="all"?cluster.color:C.borderD}`,
                       background:activeSub==="all"?cluster.color+"18":"transparent",
                       color:activeSub==="all"?cluster.color:C.slate, cursor:"pointer" }}>All</button>
            {issue.subTopics.map(s => (
              <button key={s.id} onClick={() => setActiveSub(s.id)}
                style={{ fontFamily:FB, fontSize:12, fontWeight:activeSub===s.id?600:400, padding:"4px 12px", borderRadius:20,
                         border:`1px solid ${activeSub===s.id?cluster.color:C.borderD}`,
                         background:activeSub===s.id?cluster.color+"18":"transparent",
                         color:activeSub===s.id?cluster.color:C.slate, cursor:"pointer" }}>
                {s.label} ({s.n})
              </button>
            ))}
          </div>
        )}
      </div>



      {/* Policy status when issue selected */}
      {issue && issue.policyStatus && STATUS_CONFIG[issue.policyStatus] && <div style={{ marginBottom:16 }}><PolicyStatus status={issue.policyStatus} note={issue.policyNote} /></div>}

      {/* Row A: Filing Activity + Plaintiff by Type */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14 }}>
        <FilingActivityCard key={`fa-${cluster.id}-${activeIssue}-${activeSub}`} data={scaledFilingData} yearData={issue ? issue.filedByYear : (cluster.issues.find(i=>i.filedByYear)||{}).filedByYear} color={cluster.color} total={totalCases} label={activeSub !== "all" && sub ? `cases in ${sub.label}` : issue ? `cases in ${issue.label}` : `cases in ${cluster.label}`} openPanel={openPanel} />
        <PlaintiffTypeCard data={activeWhoSues} color={cluster.color} openPanel={openPanel} clusterId={cluster.id} />
      </div>

      {/* Row B: Appointing President + SCOTUS */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14 }}>
        <AppointingPresidentCard key={`ap-${cluster.id}-${activeIssue}-${activeSub}`} color={cluster.color} baseData={judicialBase} scale={judicialScale} />
        <ScotusCard clusterId={cluster.id} color={cluster.color} />
      </div>

      {/* Map row: map 3/4 + court level/status 1/4 */}
      <div style={{ display:"grid", gridTemplateColumns:"3fr 1fr", gap:14, marginBottom:14 }}>
        <Card>
          <SL color={cluster.color}>Geographic filing pattern</SL>
          <CT>Where cases are filed</CT>
          <Mu style={{ marginBottom:10 }}>Courts with the most active cases</Mu>
          <GeoMap courts={activeCourts} color={cluster.color} openPanel={openPanel} clusterId={cluster.id} />
          <div style={{ display:"flex", flexDirection:"column", gap:4, marginTop:10 }}>
            {activeCourts.slice(0,4).map((c,i) => (
              <div key={i} style={{ display:"flex", alignItems:"center", gap:6 }}>
                <div style={{ width:6, height:6, borderRadius:"50%", background:cluster.color, opacity:1-i*.2, flexShrink:0 }}/>
                <span style={{ fontFamily:FB, fontSize:13, color:C.slate }}>{c}</span>
              </div>
            ))}
          </div>
        </Card>
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <Card style={{ flex:1 }}>
            <SL color={cluster.color}>Court level</SL>
            <CT>Split</CT>
            <Mu style={{ marginBottom:10 }}>Appellate vs. district</Mu>
            <AppDistSplit appellate={totalApp} district={totalDist} color={cluster.color} openPanel={openPanel} clusterId={cluster.id} />
          </Card>
          <Card style={{ flex:1 }}>
            <SL color={cluster.color}>Status</SL>
            <CT>Breakdown</CT>
            <div style={{ marginTop:8 }}>
              {[
                { label:"Briefing",  n:Math.round(totalCases*.54), color:C.blue   },
                { label:"Decided",   n:Math.round(totalCases*.20), color:C.amber  },
                { label:"Appeal",    n:Math.round(totalCases*.14), color:C.purple },
                { label:"Dismissed", n:Math.round(totalCases*.12), color:C.slateL },
              ].map((s,i) => (
                <Tip key={i} label="Explore cases">
                <div style={{ marginBottom:8, cursor:"pointer" }}
                  onClick={() => { const clCases = PANEL_CASES_BY_CLUSTER[cluster.id]; const cases = clCases && clCases.status && clCases.status[s.label] || []; openPanel && openPanel(s.label, cases, `${s.n} cases · Current status`, s.color); }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
                    <span style={{ fontFamily:FB, fontSize:12, color:C.slate }}>{s.label}</span>
                    <span style={{ fontFamily:FD, fontWeight:700, fontSize:12, color:s.color }}>{s.n}</span>
                  </div>
                  <div style={{ height:4, background:C.smoke, borderRadius:3 }}>
                    <div style={{ height:"100%", width:`${totalCases>0?(s.n/totalCases)*100:0}%`, background:s.color, borderRadius:3 }}/>
                  </div>
                </div>
                </Tip>
              ))}
            </div>
          </Card>
        </div>
      </div>

      {/* Spotlight + Key dates — shown when an issue is selected */}
      {issue && issue.spotlight && (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14 }}>
          {issue.spotlight && (
            <Card>
              <SL color={cluster.color}>Spotlight</SL>
              <CT>Notable language</CT>
              <Mu style={{ marginBottom:12 }}>Key quotes shaping this area</Mu>
              <SpotlightQuote quote={issue.spotlight.quote} caseName={issue.spotlight.case} context={issue.spotlight.context} color={cluster.color} />
            </Card>
          )}
          {issue.keyDates && issue.keyDates.length > 0 && (
            <Card>
              <SL color={cluster.color}>Key dates</SL>
              <CT>Upcoming deadlines</CT>
              <Mu style={{ marginBottom:10 }}>Important dates in this issue area</Mu>
              <KeyDatesStrip dates={issue.keyDates} color={cluster.color} />
            </Card>
          )}
        </div>
      )}

      {/* Lit pattern */}
      {issue && issue.litPattern && (
        <div style={{ background:C.white, border:`2px solid ${cluster.color}30`, borderRadius:14, overflow:"hidden", boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
          <div style={{ background:cluster.color, padding:"14px 20px", display:"flex", alignItems:"center", gap:12 }}>
            <span style={{ fontSize:22 }}>🔍</span>
            <div>
              <div style={{ fontFamily:FB, fontSize:12, fontWeight:600, letterSpacing:"0.16em", textTransform:"uppercase", color:"rgba(255,255,255,0.65)", marginBottom:3 }}>Litigation Pattern Spotlight</div>
              <div style={{ fontFamily:FD, fontWeight:700, fontSize:18, color:C.white, lineHeight:1 }}>{issue.litPattern.name}</div>
            </div>
          </div>
          <div style={{ padding:"16px 20px" }}>
            <div style={{ fontFamily:FB, fontSize:14, color:C.slate, lineHeight:1.7, marginBottom:10 }}>{issue.litPattern.description}</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              {issue.litPattern.cases.map((c,i) => (
                <span key={i} style={{ fontFamily:FB, fontSize:13, background:cluster.bg, color:cluster.color, border:`1px solid ${cluster.bd}`, borderRadius:8, padding:"3px 10px" }}>{c}</span>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ── CASES PANEL DATA ──────────────────────────────────────────────────────────
// Per-cluster representative cases by plaintiff type, status, filing period
// ── CASES PANEL COMPONENT ──────────────────────────────────────────────────────
function CasesPanel({ panel, onClose }) {
  if (!panel) return null;
  const { title, subtitle, cases, color } = panel;
  return (
    <>
      {/* Backdrop — click to close */}
      <div onClick={onClose}
           style={{ position:"fixed", inset:0, background:"rgba(14,34,64,0.18)", zIndex:900,
                    opacity: panel ? 1 : 0, transition:"opacity 0.25s" }}/>
      {/* Panel */}
      <div style={{
        position:"fixed", top:0, right:0, bottom:0, width:"min(400px, 90vw)",
        background:C.white, boxShadow:"-4px 0 32px rgba(0,0,0,0.18)",
        zIndex:901, display:"flex", flexDirection:"column",
        transform: panel ? "translateX(0)" : "translateX(100%)",
        transition:"transform 0.3s cubic-bezier(0.4,0,0.2,1)",
        overflowY:"auto",
      }}>
        {/* Header */}
        <div style={{ padding:"20px 20px 16px", borderBottom:`1px solid ${C.border}`, position:"sticky", top:0, background:C.white, zIndex:10 }}>
          <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:12 }}>
            <div>
              <div style={{ fontFamily:FB, fontSize:12, fontWeight:600, letterSpacing:"0.14em", textTransform:"uppercase", color: color || C.gold, marginBottom:4 }}>Related cases</div>
              <div style={{ fontFamily:FD, fontWeight:700, fontSize:18, color:C.navy, lineHeight:1.2 }}>{title}</div>
              {subtitle && <div style={{ fontFamily:FB, fontSize:13, color:C.slateL, marginTop:4 }}>{subtitle}</div>}
            </div>
            <button onClick={onClose}
              style={{ width:32, height:32, borderRadius:"50%", border:`1px solid ${C.border}`, background:C.smoke,
                       cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:2 }}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke={C.slate} strokeWidth="2" strokeLinecap="round">
                <line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/>
              </svg>
            </button>
          </div>
        </div>

        {/* Cases list */}
        <div style={{ padding:"12px 20px 24px", flex:1 }}>
          {cases && cases.length > 0 ? (
            <div style={{ display:"flex", flexDirection:"column", gap:0 }}>
              {cases.map((c, i) => (
                <a key={i} href={c.url} target="_blank" rel="noopener noreferrer"
                   style={{ display:"flex", flexDirection:"column", padding:"14px 0",
                            borderBottom: i < cases.length-1 ? `1px solid ${C.smoke}` : "none",
                            textDecoration:"none" }}
                   onMouseEnter={e => e.currentTarget.style.opacity=".75"}
                   onMouseLeave={e => e.currentTarget.style.opacity="1"}>
                  <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:10 }}>
                    <div style={{ fontFamily:FD, fontWeight:700, fontSize:15, color:C.navy, lineHeight:1.3, flex:1 }}>{c.name}</div>
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke={C.slateL} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink:0, marginTop:3 }}>
                      <path d="M5 2H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V7"/>
                      <polyline points="8 1 11 1 11 4"/><line x1="5.5" y1="6.5" x2="11" y2="1"/>
                    </svg>
                  </div>
                  {c.note && <div style={{ fontFamily:FB, fontSize:13, color:C.slateL, marginTop:4, lineHeight:1.5 }}>{c.note}</div>}
                </a>
              ))}
            </div>
          ) : (
            <div style={{ fontFamily:FB, fontSize:14, color:C.slateL, padding:"20px 0" }}>
              No specific cases tagged for this data point yet. View all cases on the tracker.
            </div>
          )}
          <a href={`${BASE}/litigation`} target="_blank" rel="noopener noreferrer"
             style={{ display:"inline-flex", alignItems:"center", gap:6, marginTop:16, fontFamily:FB, fontSize:13, fontWeight:600, color:C.navy, textDecoration:"none", padding:"8px 14px", borderRadius:8, border:`1px solid ${C.border}`, background:C.smoke }}
             onMouseEnter={e => { e.currentTarget.style.background=C.borderD; }}
             onMouseLeave={e => { e.currentTarget.style.background=C.smoke; }}>
            Browse all cases on tracker ↗
          </a>
        </div>
      </div>
    </>
  );
}

          {/* Nav links — mirrors live site + Trends */}
          <nav style={{ display:"flex", alignItems:"center", gap:0 }}>
            {[
              { label:"Litigation", href:"https://litigationtracker.law.georgetown.edu/litigation/", active:false },
              { label:"Issues",     href:"https://litigationtracker.law.georgetown.edu/issues/",    active:false },
              { label:"Trends",     href:null, active:true  },
              { label:"About",      href:"https://litigationtracker.law.georgetown.edu/about/",     active:false },
            ].map((item, i) => (
              item.active
                ? <span key={i} style={{ fontFamily:FB, fontSize:14, fontWeight:700, color:"#1a3a6b", padding:"0 18px", cursor:"default", borderBottom:"3px solid #1a3a6b", lineHeight:"72px", display:"inline-block" }}>{item.label}</span>
                : <a key={i} href={item.href} target="_blank" rel="noopener noreferrer"
                     style={{ fontFamily:FB, fontSize:14, fontWeight:500, color:"#374151", padding:"0 18px", textDecoration:"none", lineHeight:"72px", display:"inline-block", borderBottom:"3px solid transparent", transition:"color 0.15s, border-color 0.15s" }}
                     onMouseEnter={e => { e.currentTarget.style.color="#1a3a6b"; e.currentTarget.style.borderBottomColor="#1a3a6b44"; }}
                     onMouseLeave={e => { e.currentTarget.style.color="#374151"; e.currentTarget.style.borderBottomColor="transparent"; }}>
                    {item.label}
                  </a>
            ))}
          </nav>

          {/* Login */}
          <a href="https://litigationtracker.law.georgetown.edu/profile" target="_blank" rel="noopener noreferrer"
             style={{ fontFamily:FB, fontSize:14, fontWeight:500, color:"#374151", textDecoration:"none", flexShrink:0 }}
             onMouseEnter={e => e.currentTarget.style.color="#1a3a6b"}
             onMouseLeave={e => e.currentTarget.style.color="#374151"}>
            Login to your account
          </a>
        </div>
      </div>

      {/* Cluster nav */}
      <div style={{ background:"white", borderBottom:"1px solid #e5e7eb", boxShadow:"0 1px 3px rgba(0,0,0,0.06)", position:"relative", zIndex:20 }}>
        <div style={{ maxWidth:1200, margin:"0 auto", padding:"0 32px", display:"flex", alignItems:"stretch" }}>
          {/* Overview */}
          <button onClick={goOverview}
            style={{ fontFamily:FB, fontSize:13, fontWeight: view==="overview" ? 700 : 500,
                     padding:"0 16px", height:50, border:"none", flexShrink:0,
                     borderBottom:`3px solid ${view==="overview" ? "#1a3a6b" : "transparent"}`,
                     borderTop:"3px solid transparent",
                     background: view==="overview" ? "#f0f4ff" : "transparent",
                     color: view==="overview" ? "#1a3a6b" : "#374151",
                     cursor:"pointer", whiteSpace:"nowrap", transition:"all 0.15s" }}
            onMouseEnter={e => { if(view!=="overview"){ e.currentTarget.style.color="#1a3a6b"; e.currentTarget.style.background="#f5f7ff"; }}}
            onMouseLeave={e => { if(view!=="overview"){ e.currentTarget.style.color="#374151"; e.currentTarget.style.background="transparent"; }}}>
            Overview
          </button>

          {/* Divider */}
          <div style={{ width:1, height:28, background:"#e5e7eb", alignSelf:"center", margin:"0 4px", flexShrink:0 }}/>

          {/* Cluster buttons */}
          {ISSUE_CLUSTERS.map(cluster => {
            const isActive = (view==="cluster"||view==="issue") && selectedCluster && selectedCluster.id===cluster.id;
            const ct = cluster.issues.reduce((s,i)=>s+i.total,0);
            return (
              <button key={cluster.id} onClick={() => selectCluster(cluster)}
                style={{ fontFamily:FB, fontSize:13, fontWeight: isActive ? 700 : 500,
                         padding:"0 13px", height:50, border:"none", flexShrink:0,
                         borderBottom:`3px solid ${isActive ? cluster.color : "transparent"}`,
                         borderTop:"3px solid transparent",
                         background: isActive ? cluster.bg : "transparent",
                         color: isActive ? cluster.color : "#374151",
                         cursor:"pointer", whiteSpace:"nowrap", transition:"all 0.15s",
                         display:"flex", flexDirection:"column", alignItems:"flex-start", justifyContent:"center", gap:1 }}
                onMouseEnter={e => { if(!isActive){ e.currentTarget.style.color=cluster.color; e.currentTarget.style.background=cluster.bg+"88"; }}}
                onMouseLeave={e => { if(!isActive){ e.currentTarget.style.color="#374151"; e.currentTarget.style.background="transparent"; }}}>
                <span style={{ fontSize:13, lineHeight:1 }}>{cluster.label}</span>
                <span style={{ fontSize:11, color: isActive ? cluster.color : "#9ca3af", fontWeight:400, opacity:.85 }}>{ct} cases</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Issue sub-headerue sub-header — shown when drilling into an issue */}
      {(view === "issue" || view === "cluster") && selectedCluster && (
        <div style={{ background:C.white, borderBottom:`1px solid ${C.border}`, padding:"10px 32px" }}>
          <div style={{ maxWidth:1200, margin:"0 auto", display:"flex", alignItems:"center", gap:10 }}>
            {selectedIssue && <span style={{ fontSize:14 }}>{STATUS_CONFIG[selectedIssue.policyStatus] ? STATUS_CONFIG[selectedIssue.policyStatus].icon : ""}</span>}
            {selectedIssue && <div style={{ fontFamily:FD, fontWeight:700, fontSize:20, color:C.navy, lineHeight:1 }}>{selectedIssue.label}</div>}
          </div>
        </div>
      )}

      {/* Main content */}
      <div style={{ maxWidth:1200, margin:"0 auto", padding:"24px 32px 60px" }}>
        {view === "overview" && <LandingOverview onSelect={selectIssue} openPanel={openPanel} />}
        {view === "cluster"  && selectedCluster && <ClusterDashboard cluster={selectedCluster} onSelectIssue={selectIssue} openPanel={openPanel} />}
        {view === "issue"    && selectedIssue   && <IssueDashboard issue={selectedIssue} clusterColor={selectedCluster.color} clusterBg={selectedCluster.bg} clusterBd={selectedCluster.bd} openPanel={openPanel} />}
      </div>

      <div style={{ maxWidth:1200, margin:"0 auto", padding:"14px 32px 24px", borderTop:`1px solid ${C.border}`, fontFamily:FB, fontSize:14, color:C.slateL }}>
        Georgetown O'Neill Institute for National and Global Health Law · litigationtracker.law.georgetown.edu · March 2026 · Counts estimated from public case archive · Brainstorm prototype
      </div>

      {/* Slide-out cases panel */}
      <CasesPanel panel={panel} onClose={closePanel} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Dashboard));
</script>
</body>
</html>
