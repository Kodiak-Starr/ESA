// ── INLINE SVG CHART REPLACEMENTS (no Recharts needed) ───────────────────────

function SvgBarChart({ data, color, height = 110, labelKey = "y" }) {
  const [tooltip, setTooltip] = useState(null);
  const max = Math.max(...data.map(d => d.n), 1);
  const padL = 4, padR = 4, padT = 6, padB = 18;
  const W = 280, H = height;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const barW = (chartW / data.length) * 0.6;
  const gap   = (chartW / data.length) * 0.4;
  // Show every other label when there are many bars
  const showLabel = (i) => data.length <= 6 ? true : i % 2 === 0;

  return (
    <div style={{ position:"relative", width:"100%", userSelect:"none" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height, display:"block" }}>
        {data.map((d, i) => {
          const bh = Math.max((d.n / max) * chartH, 2);
          const x  = padL + i * (barW + gap) + gap / 2;
          const y  = padT + chartH - bh;
          return (
            <g key={i}
               onMouseEnter={() => setTooltip({ i, x: x + barW / 2, y, n: d.n, label: d[labelKey] })}
               onMouseLeave={() => setTooltip(null)}
               style={{ cursor:"pointer" }}>
              <rect x={x} y={y} width={barW} height={bh}
                    fill={tooltip && tooltip.i === i ? color : color + "cc"}
                    rx="2" ry="2"/>
              <text x={x + barW / 2} y={H - 4}
                    textAnchor="middle" fontSize="7" fill={C.slateL} fontFamily={FB}>
                {showLabel(i) ? d[labelKey] : ""}
              </text>
            </g>
          );
        })}
        <line x1={padL} y1={padT + chartH} x2={W - padR} y2={padT + chartH}
              stroke={C.border} strokeWidth="0.5"/>
      </svg>
      {tooltip && (
        <div style={{
          position:"absolute", pointerEvents:"none",
          top: Math.max(0, (tooltip.y / height) * 100) + "%",
          left: Math.min(80, (tooltip.x / 280) * 100) + "%",
          transform:"translate(-50%, -110%)",
          background:C.white, border:`1px solid ${C.border}`,
          borderRadius:6, padding:"5px 9px",
          fontFamily:FB, fontSize:14, boxShadow:"0 2px 8px rgba(0,0,0,0.1)",
          whiteSpace:"nowrap", zIndex:10,
        }}>
          <span style={{ fontWeight:600, color:C.navy }}>{tooltip.label}</span>
          {" — "}
          <span style={{ color }}>{tooltip.n} cases</span>
        </div>
      )}
    </div>
  );
}

function SvgDonutChart({ data, colors, size = 130 }) {
  const [hovered, setHovered] = useState(null);
  const total = data.reduce((s, d) => s + d.n, 0);
  if (!total) return null;
  const cx = size / 2, cy = size / 2;
  const outerR = size * 0.44, innerR = size * 0.26;

  let angle = -Math.PI / 2;
  const slices = data.map((d, i) => {
    const sweep = (d.n / total) * 2 * Math.PI;
    const a1 = angle, a2 = angle + sweep;
    angle += sweep;
    const large = sweep > Math.PI ? 1 : 0;
    const x1 = cx + outerR * Math.cos(a1), y1 = cy + outerR * Math.sin(a1);
    const x2 = cx + outerR * Math.cos(a2), y2 = cy + outerR * Math.sin(a2);
    const x3 = cx + innerR * Math.cos(a2), y3 = cy + innerR * Math.sin(a2);
    const x4 = cx + innerR * Math.cos(a1), y4 = cy + innerR * Math.sin(a1);
    return {
      path:`M${x1} ${y1} A${outerR} ${outerR} 0 ${large} 1 ${x2} ${y2} L${x3} ${y3} A${innerR} ${innerR} 0 ${large} 0 ${x4} ${y4}Z`,
      color: colors[i % colors.length], name: d.name, n: d.n,
    };
  });

  return (
    <div style={{ position:"relative", display:"inline-block" }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {slices.map((s, i) => (
          <path key={i} d={s.path}
                fill={hovered === i ? s.color : s.color + "dd"}
                stroke={C.white} strokeWidth="1"
                style={{ cursor:"pointer", transition:"fill 0.15s" }}
                onMouseEnter={() => setHovered(i)}
                onMouseLeave={() => setHovered(null)}/>
        ))}
      </svg>
      {hovered !== null && (
        <div style={{
          position:"absolute", top:"50%", left:"50%",
          transform:"translate(-50%,-50%)",
          textAlign:"center", pointerEvents:"none",
        }}>
          <div style={{ fontFamily:FD, fontWeight:700, fontSize:14, color:C.navy, lineHeight:1 }}>
            {slices[hovered].n}
          </div>
          <div style={{ fontFamily:FB, fontSize:14, color:C.slateL, lineHeight:1.3, maxWidth:50 }}>
            {slices[hovered].name}
          </div>
        </div>
      )}
    </div>
  );
}

function AppDistSplit({ appellate, district, color }) {
  const total = appellate + district;
  const aPct = Math.round(appellate / total * 100);
  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
        <span style={{ fontFamily:FB, fontSize:14, color:C.slateL }}>Court level split</span>
        <span style={{ fontFamily:FB, fontSize:14, color:C.slateL }}>{total} cases</span>
      </div>
      <div style={{ height:10, background:C.smoke, borderRadius:5, display:"flex", overflow:"hidden", marginBottom:6 }}>
        <div style={{ width:`${aPct}%`, background:color, borderRadius:"5px 0 0 5px" }} />
        <div style={{ width:`${100 - aPct}%`, background:color + "55", borderRadius:"0 5px 5px 0" }} />
      </div>
      <div style={{ display:"flex", justifyContent:"space-between" }}>
        <div style={{ display:"flex", alignItems:"center", gap:5 }}>
          <div style={{ width:8, height:8, borderRadius:2, background:color }} />
          <span style={{ fontFamily:FB, fontSize:14, color:C.slate }}>Appellate: <strong>{appellate}</strong> ({aPct}%)</span>

        <div style={{ display:"flex", alignItems:"center", gap:5 }}>
          <div style={{ width:8, height:8, borderRadius:2, background:color + "55" }} />

    </div>
  );
}

function GeoMap({ courts, color }) {
  const [hovered, setHovered] = useState(null);

  const activeStates = new Set(
    courts.flatMap(c => COURT_TO_STATES[c] || [])
  );

  return (
    <div style={{ position:"relative", width:"100%", paddingBottom:"60%", background:"#f0f4f8", borderRadius:8, border:`1px solid ${C.border}`, overflow:"hidden" }}>
      <svg viewBox="0 0 280 168" style={{ position:"absolute", top:0, left:0, width:"100%", height:"100%" }} preserveAspectRatio="xMidYMid meet">
        {/* US land background */}
        <path d={US_PATH} fill="#e4eaf3" stroke="#c5d0df" strokeWidth="0.8"/>

        {/* All state dots */}
        {Object.entries(STATE_POSITIONS).map(([abbr, pos]) => {
          const isActive = activeStates.has(abbr);
          const isHov    = hovered === abbr;
          return (
            <g key={abbr}
               onMouseEnter={() => setHovered(abbr)}
               onMouseLeave={() => setHovered(null)}
               style={{ cursor: isActive ? "pointer" : "default" }}>
              <circle
                cx={pos.x} cy={pos.y}
                r={isActive ? (isHov ? 6.5 : 5.5) : 2.8}
                fill={isActive ? color : "#bec9d8"}
                stroke={isActive ? "rgba(255,255,255,0.85)" : "none"}
                strokeWidth="1.2"
                opacity={isActive ? 1 : 0.5}
                style={{ transition:"r 0.12s" }}
              />
              {isActive && (
                <text x={pos.x} y={pos.y + 9.5}
                      textAnchor="middle" fontSize="4.5"
                      fill={color} fontFamily={FB} fontWeight="700"
                      opacity="0.85">
                  {abbr}
                </text>
              )}
            </g>
          );
        })}
      </svg>

      {/* Tooltip on hover */}
      {hovered && activeStates.has(hovered) && (() => {
        const matchedCourts = courts.filter(c => (COURT_TO_STATES[c] || []).includes(hovered));
        return (
          <div style={{
            position:"absolute", bottom:6, left:8,
            background:"rgba(14,34,64,0.9)", color:"white",
            borderRadius:6, padding:"4px 8px",
            fontFamily:FB, fontSize:14, pointerEvents:"none",
            maxWidth:"80%",
          }}>
            <strong>{hovered}</strong> — {matchedCourts.join(", ")}
          </div>
        );
      })()}
    </div>
  );
}

function KeyDatesStrip({ dates, color }) {
  const tc = {

// ── LATEST INSIGHTS COMPONENT ──────────────────────────────────────────────────
function LatestInsights({ issueId, activeSubId, color }) {
  const subInsights  = activeSubId && activeSubId !== "all" ? INSIGHTS[activeSubId] : null;
  const issueInsights = INSIGHTS[issueId] || [];
  const items = (subInsights && subInsights.length ? subInsights : issueInsights);
  if (!items.length) return null;

  const sourceColors = {
    "O'Neill Institute": C.navy,
    "Health Affairs":    C.blue,
    "STAT News":         C.purple,
    "JAMA":              C.green,
    "JAMA Health Forum": C.green,
    "KFF":               C.amber,
    "MedPage Today":     C.teal,
  };

  return (
    <div style={{ marginTop:14 }}>
      <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", marginBottom:10 }}>
        <div style={{ fontFamily:FB, fontSize:14, fontWeight:600, letterSpacing:"0.16em", textTransform:"uppercase", color:C.gold }}>
          Latest Insights
        </div>
        <div style={{ fontFamily:FB, fontSize:14, color:C.slateL, fontStyle:"italic" }}>
          {subInsights ? "For this sub-topic" : "For this issue area"}
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
        {items.map((item, i) => {
          const srcColor = sourceColors[item.source] || C.slate;
          return (
            <a key={i} href={item.url} target="_blank" rel="noopener noreferrer"
               style={{ textDecoration:"none", display:"flex", flexDirection:"column",
                        background:C.white, border:`1px solid ${C.border}`,
                        borderRadius:10, overflow:"hidden", boxShadow:"0 1px 4px rgba(0,0,0,0.04)",
                        transition:"box-shadow 0.15s, transform 0.15s" }}
               onMouseEnter={e => { e.currentTarget.style.boxShadow = "0 4px 14px rgba(0,0,0,0.10)"; e.currentTarget.style.transform = "translateY(-1px)"; }}
               onMouseLeave={e => { e.currentTarget.style.boxShadow = "0 1px 4px rgba(0,0,0,0.04)"; e.currentTarget.style.transform = "translateY(0)"; }}>
              {/* Color bar */}
              <div style={{ height:3, background:srcColor }} />
              <div style={{ padding:"12px 14px", flex:1, display:"flex", flexDirection:"column" }}>
                <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:8 }}>
                  <span style={{ fontFamily:FB, fontSize:14, fontWeight:700, color:srcColor,
                                 background:srcColor + "12", padding:"2px 7px",
                                 borderRadius:10, letterSpacing:"0.04em", flexShrink:0 }}>
                    {item.source}
                  </span>
                  <span style={{ fontFamily:FB, fontSize:14, color:C.slateL }}>{item.date}</span>
                </div>
                <div style={{ fontFamily:FD, fontSize:14, color:C.navy, lineHeight:1.45,
                              fontWeight:600, flex:1 }}>
                  {item.title}
                </div>
              </div>
              <div style={{ padding:"8px 14px", borderTop:`1px solid ${C.smoke}`,
                            display:"flex", alignItems:"center", gap:4 }}>
                <span style={{ fontFamily:FB, fontSize:14, color:srcColor, fontWeight:500 }}>Read →</span>
              </div>
            </a>
          );
        })}
      </div>
    </div>
  );
}

// ── ISSUE DASHBOARD ───────────────────────────────────────────────────────────
function IssueDashboard({ issue, clusterColor }) {
  const [activeSub, setActiveSub] = useState("all");
  const sub = issue.subTopics && issue.subTopics.find(s => s.id === activeSub);
  const appellate = activeSub === "all" ? issue.appellate : (sub ? sub.appellate : 0);
  const district  = activeSub === "all" ? issue.district  : (sub ? sub.district  : 0);
  const total = appellate + district;
  // Active courts + plaintiff data — fall back to issue level when subtopic has none
  const activeCourts  = (activeSub !== "all" && sub && sub.courts  && sub.courts.length)  ? sub.courts  : issue.courts;
  const activeWhoSues = (activeSub !== "all" && sub && sub.whoSues && sub.whoSues.length)  ? sub.whoSues : issue.whoSues;
  const donutColors = [clusterColor, clusterColor + "aa", clusterColor + "66", clusterColor + "33"];

  return (
    <div>
      {issue.subTopics && issue.subTopics.length > 0 && (
        <div style={{ marginBottom:16 }}>
          <div style={{ fontFamily:FB, fontSize:14, fontWeight:600, letterSpacing:"0.14em", textTransform:"uppercase", color:C.slateL, marginBottom:10 }}>Filter by sub-topic</div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            <button
              onClick={() => setActiveSub("all")}
              style={{
                fontFamily:FB, fontSize:14, fontWeight:activeSub === "all" ? 700 : 500,
                padding:"8px 18px", borderRadius:8,
                border:`2px solid ${activeSub === "all" ? clusterColor : C.borderD}`,
                background:activeSub === "all" ? clusterColor : C.white,
                color:activeSub === "all" ? C.white : C.slate,
                cursor:"pointer", transition:"all 0.15s",
                boxShadow: activeSub === "all" ? `0 2px 8px ${clusterColor}40` : "none",
              }}>
              All <span style={{ opacity:.75, fontWeight:400 }}>({issue.total})</span>
            </button>

function LandingOverview({ onSelect, onCalendar }) {
  const allIssues = ISSUE_CLUSTERS.flatMap(c => c.issues.map(i => ({ ...i, cluster:c })));
  const totalCases     = allIssues.reduce((s, i) => s + i.total, 0);
  const totalAppellate = allIssues.reduce((s, i) => s + i.appellate, 0);
  const totalDistrict  = allIssues.reduce((s, i) => s + i.district, 0);
  const blocked   = allIssues.filter(i => i.policyStatus === "blocked").length;
  const contested = allIssues.filter(i => i.policyStatus === "contested").length;

  return (
    <div>
      {/* ── This Week action strip ── */}
      {(() => {
        const today = { month:3, day:24, year:2026 };
        const todaySortKey = today.year*10000 + today.month*100 + today.day;
        const thisWeekEnd  = today.year*10000 + today.month*100 + (today.day + 7);
        const MONTH_NUM = { Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12 };
        const thisWeek = ISSUE_CLUSTERS.flatMap(cluster =>
          cluster.issues.flatMap(issue =>
            (issue.keyDates || []).map(d => {
              const parts = d.date.split(" ");
              const month = MONTH_NUM[parts[0]] || 0, day = parseInt(parts[1]) || 0;
              const sk = 2026*10000 + month*100 + day;
              return { ...d, month, day, sortKey:sk, cluster, issue };
            })
          )
        ).filter(d => d.sortKey >= todaySortKey && d.sortKey <= thisWeekEnd)
         .sort((a,b) => a.sortKey - b.sortKey)
         .slice(0, 4);

        if (!thisWeek.length) return null;
        const MONTH_SHORT = ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return (
          <div style={{ background:C.navy, borderRadius:12, padding:"14px 20px", marginBottom:22, display:"flex", alignItems:"center", gap:16 }}>
            <div style={{ flexShrink:0 }}>
              <div style={{ fontFamily:FB, fontSize:14, fontWeight:700, letterSpacing:"0.16em", textTransform:"uppercase", color:C.gold, marginBottom:3 }}>Action this week</div>
              <div style={{ fontFamily:FD, fontWeight:700, fontSize:15, color:C.white, lineHeight:1 }}>Upcoming deadlines</div>
            </div>
            <div style={{ width:1, height:36, background:"rgba(255,255,255,0.15)", flexShrink:0 }}/>
            <div style={{ display:"flex", gap:10, flex:1, overflowX:"auto", paddingBottom:2 }}>
              {thisWeek.map((d, i) => {
                const isH = d.type === "Oral Argument" || d.type === "Hearing";
                const caseUrl = CASE_URLS[d.case];
                return (
                  <a key={i}
                     href={caseUrl || ISSUE_URLS[d.issue.id] || BASE + "/litigation"}
                     target="_blank" rel="noopener noreferrer"
                     style={{ display:"flex", alignItems:"center", gap:8, padding:"7px 12px",
                              background: isH ? C.redBr : "rgba(255,255,255,0.1)",
                              borderRadius:8, border:`1px solid ${isH ? C.redBd : "rgba(255,255,255,0.15)"}`,

                     onMouseEnter={e => e.currentTarget.style.background = isH ? "#b91c1c" : "rgba(255,255,255,0.18)"}
                     onMouseLeave={e => e.currentTarget.style.background = isH ? C.redBr : "rgba(255,255,255,0.1)"}>
                    <div style={{ textAlign:"center", minWidth:28 }}>
                      <div style={{ fontFamily:FD, fontWeight:700, fontSize:16, color:isH ? C.white : C.gold, lineHeight:1 }}>{d.day}</div>
                      <div style={{ fontFamily:FB, fontSize:14, color:"rgba(255,255,255,0.6)", lineHeight:1 }}>{MONTH_SHORT[d.month]}</div>
                    </div>
                    <div>
                      <div style={{ fontFamily:FB, fontSize:14, fontWeight:600, color:"rgba(255,255,255,0.55)", marginBottom:1 }}>{d.type}</div>
                      <div style={{ fontFamily:FB, fontSize:14, color:C.white, fontWeight:500, maxWidth:160, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{d.case}</div>
                    </div>
                  </a>
                );
              })}
            </div>
            <button onClick={onCalendar}
               style={{ flexShrink:0, fontFamily:FB, fontSize:14, color:C.navy, fontWeight:700, background:C.gold, border:"none", borderRadius:8, padding:"7px 14px", cursor:"pointer", whiteSpace:"nowrap", display:"flex", alignItems:"center", gap:6, transition:"opacity 0.15s" }}
               onMouseEnter={e => e.currentTarget.style.opacity=".85"}
               onMouseLeave={e => e.currentTarget.style.opacity="1"}>
              📅 Key Dates
            </button>
          </div>
        );
      })()}

      {/* Cases to Watch — lead with editorial judgment */}

        <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", marginBottom:14 }}>

            <div style={{ fontFamily:FD, fontWeight:700, fontSize:22, color:C.navy, lineHeight:1 }}>3 Cases to Watch</div>
          </div>
          <div style={{ fontFamily:FB, fontSize:14, color:C.slateL, fontStyle:"italic" }}>High-stakes litigation shaping health policy right now</div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:14 }}>
          {[
            { tagColor:C.blue,   title:"TMA v. HHS (TMA III)",     stat:"Oral Argument May 5",  statColor:C.redBr, court:"Fifth Circuit",  trend:"The fifth round of TMA litigation — providers are challenging the qualifying payment amount formula that determines arbitration anchors. A win could upend the entire IDR system.",            signal:"🔴 Watch closely",         signalColor:C.redBr, signalBg:C.redBrL  },
            { tagColor:C.red,    title:"Harvard College v. HHS",    stat:"Brief due Apr 15",     statColor:C.amber, court:"First Circuit",  trend:"One of the highest-profile funding termination cases — Harvard's challenge to NIH indirect cost rate cuts could set binding precedent for all research institutions across the First Circuit.", signal:"📈 Rapidly escalating",    signalColor:C.amber, signalBg:C.amberL  },
            { tagColor:C.green,  title:"AbbVie v. HHS (Botox)",     stat:"Oral Argument Apr 20", statColor:C.redBr, court:"D.C. Circuit",   trend:"AbbVie challenges Botox selection for Medicare negotiation using First Amendment compelled-speech theory — the same doctrine driving 14 parallel pharma cases.",                         signal:"🔗 Parallel to 14 cases", signalColor:C.green, signalBg:C.greenL  },

              </div>
            </div>
          ))}

          {/* ── Notable Language rotator ── */}
          {(() => {
            const quotes = ISSUE_CLUSTERS.flatMap(cluster =>
              cluster.issues.map(issue => ({
                quote: issue.spotlight.quote,
                case:  issue.spotlight.case,
                context: issue.spotlight.context,
                color: cluster.color,
                bg: cluster.bg,
                bd: cluster.bd,
                cluster: cluster.label,
                issueLabel: issue.label,
                issueObj: issue,
                clusterObj: cluster,
              }))
            );
            const [idx, setIdx] = useState(0);
            const [fading, setFading] = useState(false);

            function goTo(next) {
              setFading(true);
              setTimeout(() => { setIdx(next); setFading(false); }, 220);
            }
            function prev() { goTo((idx - 1 + quotes.length) % quotes.length); }
            function next() { goTo((idx + 1) % quotes.length); }

            const q = quotes[idx];

            return (
              <div style={{ background:C.navy, border:`1px solid ${C.border}`, borderRadius:14, boxShadow:"0 2px 8px rgba(0,0,0,0.05)", display:"flex", flexDirection:"column", overflow:"hidden", position:"relative" }}>
                {/* colored top bar matching cluster */}

          const topPlaintiff = cluster.issues.flatMap(i => i.whoSues).reduce((b, p) => p.n > b.n ? p : b, { name:"", n:0 });
          const nextDate     = cluster.issues.flatMap(i => i.keyDates || [])[0];

          return (
            <div key={cluster.id} style={{ background:C.white, border:`1px solid ${cluster.bd}`, borderRadius:14, boxShadow:"0 2px 8px rgba(0,0,0,0.05)", overflow:"hidden" }}>
              {/* Header */}
              <div style={{ background:cluster.bg, padding:"16px 18px 14px", borderBottom:`1px solid ${cluster.bd}` }}>
                <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>
                  <div>
                    <div style={{ fontFamily:FB, fontSize:14, fontWeight:600, letterSpacing:"0.16em", textTransform:"uppercase", color:cluster.color, opacity:.7, marginBottom:5 }}>Issue cluster</div>
                    <div style={{ fontFamily:FD, fontWeight:700, fontSize:20, color:cluster.color, lineHeight:1.1 }}>{cluster.label}</div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontFamily:FD, fontWeight:700, fontSize:34, color:cluster.color, lineHeight:1 }}>{ct}</div>

                  </div>
                </div>
                <div style={{ marginTop:12 }}>

                <svg viewBox={`0 0 ${spark.length * 18} 28`} style={{ width:"100%", height:28, overflow:"visible" }}>

                          <path d="M5 2H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V7"/>

      </div>
      {/* ── Charts row: Circuit Court Volume + Plaintiff by Type ── */}
      {(() => {
        // ── Build circuit court data ──────────────────────────────
        const CIRCUIT_MAP = {
          "First Circuit":   "1st Circuit",
          "Second Circuit":  "2nd Circuit",
          "Third Circuit":   "3rd Circuit",
          "Fourth Circuit":  "4th Circuit",
          "Fifth Circuit":   "5th Circuit",
          "Sixth Circuit":   "6th Circuit",
          "Seventh Circuit": "7th Circuit",
          "Eighth Circuit":  "8th Circuit",
          "Ninth Circuit":   "9th Circuit",
          "Tenth Circuit":   "10th Circuit",
          "Eleventh Circuit":"11th Circuit",
          "D.C. Circuit":    "D.C. Circuit",
        };
        const circuitTotals = {};
        ISSUE_CLUSTERS.forEach(cluster => {
          cluster.issues.forEach(issue => {
            (issue.courts || []).forEach(court => {
              const label = CIRCUIT_MAP[court];
              if (label) circuitTotals[label] = (circuitTotals[label] || 0) + issue.total;
            });
          });
        });
        const circuitData = Object.entries(circuitTotals)
          .sort((a, b) => b[1] - a[1]);
        const circuitMax = Math.max(...circuitData.map(d => d[1]), 1);

        // ── Build plaintiff type data ──────────────────────────────
        const plaintiffTotals = {};
        ISSUE_CLUSTERS.forEach(cluster => {
          cluster.issues.forEach(issue => {
            (issue.whoSues || []).forEach(p => {
              plaintiffTotals[p.name] = (plaintiffTotals[p.name] || 0) + p.n;
            });
          });
        });
        const plaintiffData = Object.entries(plaintiffTotals)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 10);
        const plaintiffMax = Math.max(...plaintiffData.map(d => d[1]), 1);

        const PLAINTIFF_COLORS = [
          C.navy, C.blue, C.purple, C.red, C.green,
          C.amber, C.teal, C.rose || "#9d174d", "#0e7490", "#374151",
        ];

        const [hovCircuit,  setHovCircuit]  = useState(null);
        const [hovPlaintiff, setHovPlaintiff] = useState(null);
        const [tooltipPos, setTooltipPos] = useState({ x:0, y:0 });

        const chartH = 200;
        const barW   = 28;
        const gapW   = 12;

        return (
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:22 }}>

            {/* ── Circuit Court Volume ── */}
            <div style={{ background:C.white, border:`1px solid ${C.border}`, borderRadius:14, overflow:"hidden", boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
              <div style={{ padding:"16px 20px 12px", borderBottom:`1px solid ${C.smoke}` }}>
                <div style={{ fontFamily:FB, fontSize:14, fontWeight:600, letterSpacing:"0.14em", textTransform:"uppercase", color:C.gold, marginBottom:4 }}>Filing geography</div>
                <div style={{ fontFamily:FD, fontWeight:700, fontSize:18, color:C.navy, lineHeight:1 }}>Case Volume by Circuit Court</div>
                <div style={{ fontFamily:FB, fontSize:14, color:C.slateL, marginTop:4 }}>Cases filed before each federal appellate circuit</div>
              </div>
              <div style={{ padding:"16px 20px 8px", position:"relative" }}>
                <div style={{ display:"flex", alignItems:"flex-end", gap:`${gapW}px`, height:`${chartH}px`, overflowX:"auto", paddingBottom:4 }}>
                  {circuitData.map(([label, count], i) => {
                    const bh = Math.max((count / circuitMax) * (chartH - 32), 6);
                    const isHov = hovCircuit === label;
                    const col = isHov ? C.gold : C.navy;
                    return (
                      <div key={label}
                        onMouseEnter={e => { setHovCircuit(label); setTooltipPos({ x: e.clientX, y: e.clientY }); }}
                        onMouseMove={e  => setTooltipPos({ x: e.clientX, y: e.clientY })}
                        onMouseLeave={() => setHovCircuit(null)}
                        style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4, cursor:"default", flexShrink:0 }}>
                        {/* count label */}
                        <div style={{ fontFamily:FD, fontWeight:700, fontSize:14, color:col, lineHeight:1, opacity: isHov ? 1 : 0.7 }}>{count}</div>
                        {/* bar */}
                        <div style={{ width:`${barW}px`, height:`${bh}px`, background:col, borderRadius:"4px 4px 0 0", transition:"background 0.15s" }}/>
                        {/* axis label */}
                        <div style={{ fontFamily:FB, fontSize:14, color:C.slateL, textAlign:"center", lineHeight:1.2, width:`${barW + 8}px`, wordBreak:"keep-all" }}>{label.replace(" Circuit","")}</div>
                      </div>
                    );
                  })}
                  {/* baseline */}
                </div>
                <div style={{ height:1, background:C.borderD, marginTop:2 }}/>
                {/* Fixed tooltip — renders outside any overflow container */}
                {hovCircuit && (
                  <div style={{ position:"fixed", left: tooltipPos.x + 14, top: tooltipPos.y - 36, background:"rgba(14,34,64,0.95)", color:"white", borderRadius:8, padding:"7px 12px", fontFamily:FB, fontSize:14, whiteSpace:"nowrap", zIndex:9999, pointerEvents:"none", boxShadow:"0 4px 14px rgba(0,0,0,0.25)" }}>
                    {hovCircuit}: <strong>{circuitTotals[hovCircuit]}</strong> cases
                  </div>
                )}
              </div>
              <div style={{ padding:"8px 20px 12px", fontFamily:FB, fontSize:14, color:C.slateL }}>
                Note: cases filed in district courts within each circuit are attributed to that circuit
              </div>
            </div>

            {/* ── Plaintiff by Type ── */}
            <div style={{ background:C.white, border:`1px solid ${C.border}`, borderRadius:14, overflow:"hidden", boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
              <div style={{ padding:"16px 20px 12px", borderBottom:`1px solid ${C.smoke}` }}>
                <div style={{ fontFamily:FB, fontSize:14, fontWeight:600, letterSpacing:"0.14em", textTransform:"uppercase", color:C.gold, marginBottom:4 }}>Who's suing</div>
                <div style={{ fontFamily:FD, fontWeight:700, fontSize:18, color:C.navy, lineHeight:1 }}>Plaintiff by Type</div>
                <div style={{ fontFamily:FB, fontSize:14, color:C.slateL, marginTop:4 }}>Aggregated across all tracked issue areas</div>
              </div>
              <div style={{ padding:"14px 20px 12px", display:"flex", flexDirection:"column", gap:8 }}>
                {plaintiffData.map(([name, count], i) => {
                  const pct = Math.round((count / plaintiffMax) * 100);
                  const isHov = hovPlaintiff === name;
                  const col = PLAINTIFF_COLORS[i % PLAINTIFF_COLORS.length];
                  return (
                    <div key={name}
                      onMouseEnter={() => setHovPlaintiff(name)}
                      onMouseLeave={() => setHovPlaintiff(null)}
                      style={{ cursor:"default" }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                          <div style={{ width:8, height:8, borderRadius:2, background:col, flexShrink:0 }}/>
                          <span style={{ fontFamily:FB, fontSize:14, color:C.navy, fontWeight: isHov ? 600 : 400 }}>{name}</span>
                        </div>
                        <span style={{ fontFamily:FD, fontWeight:700, fontSize:14, color:col }}>{count}</span>
                      </div>
                      <div style={{ height:7, background:C.smoke, borderRadius:4, overflow:"hidden" }}>
                        <div style={{
                          height:"100%", borderRadius:4,
                          width:`${pct}%`,
                          background: isHov ? C.gold : col,
                          transition:"width 0.4s ease, background 0.15s",
                        }}/>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{ padding:"8px 20px 12px", fontFamily:FB, fontSize:14, color:C.slateL }}>
                Counts may overlap where a single case has multiple plaintiff categories
              </div>
            </div>

          </div>
        );
      })()}

    </div>
  );
}

function buildAllDates() {
  const MONTH_NUM = { Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12 };
  const rows = [];
  ISSUE_CLUSTERS.forEach(cluster => {
    cluster.issues.forEach(issue => {
      (issue.keyDates || []).forEach(d => {
        const parts = d.date.split(" ");
        const month = MONTH_NUM[parts[0]] || 0;
        const day   = parseInt(parts[1]) || 0;
        const year  = 2026;
        rows.push({ ...d, month, day, year, sortKey: year*10000 + month*100 + day, cluster, issue });
      });
    });
  });
  rows.sort((a,b) => a.sortKey - b.sortKey);
  return rows;
}

const ALL_DATES = buildAllDates();
const MONTH_NAMES = ["","January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTH_SHORT = ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function CalendarPage({ onSelectIssue }) {
  const today = { month:3, day:19, year:2026 };
  const [currentMonth,   setCurrentMonth]   = useState(3);
  const [currentYear,    setCurrentYear]    = useState(2026);
  const [selectedDay,    setSelectedDay]    = useState(null);
  const [filterCluster,  setFilterCluster]  = useState("all");

  const TYPE_COLORS = {
    "Oral Argument":C.redBr,"Hearing":C.redBr,
    "Brief Due":C.blue,"Response Due":C.blue,"Motion Due":C.blue,"Answer Due":C.blue,
    "Expert Disclosure":C.purple,"Discovery Deadline":C.amber,
    "Status Conference":C.slateL,"Joint Report Due":C.slateL,
  };

  const filtered = ALL_DATES.filter(d => filterCluster === "all" || d.cluster.id === filterCluster);
  const monthDates = filtered.filter(d => d.month === currentMonth && d.year === currentYear);
  const dayDates   = selectedDay
    ? filtered.filter(d => d.month === currentMonth && d.day === selectedDay && d.year === currentYear)
    : [];

  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  const firstDow    = new Date(currentYear, currentMonth - 1, 1).getDay();
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const byDay = {};
  monthDates.forEach(d => { if (!byDay[d.day]) byDay[d.day]=[]; byDay[d.day].push(d); });

  function prevMonth() { if(currentMonth===1){setCurrentMonth(12);setCurrentYear(y=>y-1);}else setCurrentMonth(m=>m-1); setSelectedDay(null); }
  function nextMonth() { if(currentMonth===12){setCurrentMonth(1);setCurrentYear(y=>y+1);}else setCurrentMonth(m=>m+1); setSelectedDay(null); }

  const todaySortKey = today.year*10000 + today.month*100 + today.day;
  const upcoming = filtered.filter(d => d.sortKey >= todaySortKey).slice(0, 30);

  return (
    <div>
      {/* Page header */}
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:22 }}>
        <div>
          <div style={{ fontFamily:FB, fontSize:14, fontWeight:600, letterSpacing:"0.16em", textTransform:"uppercase", color:C.gold, marginBottom:4 }}>O'Neill Institute · Georgetown Law</div>
          <h2 style={{ fontFamily:FD, fontWeight:700, fontSize:28, color:C.navy, margin:0, lineHeight:1.1 }}>Key Dates Calendar</h2>
          <p style={{ fontFamily:FB, fontSize:14, color:C.slateL, marginTop:6 }}>All upcoming court deadlines, hearings, and oral arguments across every tracked issue area.</p>
        </div>
        <div style={{ display:"flex", gap:10, flexShrink:0 }}>
          {[
            { label:"Total dates", n:ALL_DATES.length, color:C.navy, bg:C.navyL, bd:"#c3cfe0" },
            { label:"Hearings & Arguments", n:ALL_DATES.filter(d=>d.type==="Oral Argument"||d.type==="Hearing").length, color:C.redBr, bg:C.redBrL, bd:C.redBrBd },
            { label:"Brief deadlines", n:ALL_DATES.filter(d=>["Brief Due","Response Due","Answer Due","Motion Due"].includes(d.type)).length, color:C.blue, bg:C.blueL, bd:C.blueBd },
          ].map((s,i) => (
            <div key={i} style={{ background:s.bg, border:`1px solid ${s.bd}`, borderRadius:10, padding:"10px 16px", textAlign:"center" }}>
              <div style={{ fontFamily:FD, fontWeight:700, fontSize:22, color:s.color, lineHeight:1 }}>{s.n}</div>
              <div style={{ fontFamily:FB, fontSize:14, color:s.color, opacity:.7, marginTop:3, lineHeight:1.3, maxWidth:90 }}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Cluster filter */}
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:18, alignItems:"center" }}>

        <button onClick={() => setFilterCluster("all")} style={{ fontFamily:FB, fontSize:14, padding:"4px 14px", borderRadius:20, border:`1px solid ${filterCluster==="all"?C.navy:C.border}`, background:filterCluster==="all"?C.navy:"transparent", color:filterCluster==="all"?C.white:C.slate, cursor:"pointer", fontWeight:filterCluster==="all"?600:400 }}>All Issues</button>
        {ISSUE_CLUSTERS.map(c => (
          <button key={c.id} onClick={() => setFilterCluster(c.id)} style={{ fontFamily:FB, fontSize:14, padding:"4px 14px", borderRadius:20, border:`1px solid ${filterCluster===c.id?c.color:c.bd}`, background:filterCluster===c.id?c.bg:"transparent", color:filterCluster===c.id?c.color:C.slate, cursor:"pointer", fontWeight:filterCluster===c.id?600:400 }}>{c.label}</button>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 320px", gap:20, alignItems:"start" }}>
        {/* Left: calendar grid */}
        <div>
          <div style={{ background:C.white, border:`1px solid ${C.border}`, borderRadius:14, overflow:"hidden", boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
            {/* Month nav */}
            <div style={{ background:C.navy, padding:"16px 20px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <button onClick={prevMonth} style={{ background:"rgba(255,255,255,0.12)", border:"none", borderRadius:8, color:"white", cursor:"pointer", padding:"6px 14px", fontFamily:FB, fontSize:16, fontWeight:600, lineHeight:1 }}>‹</button>
              <div style={{ textAlign:"center" }}>
                <div style={{ fontFamily:FD, fontWeight:700, fontSize:22, color:C.white, lineHeight:1 }}>{MONTH_NAMES[currentMonth]} {currentYear}</div>

              </div>
              <button onClick={nextMonth} style={{ background:"rgba(255,255,255,0.12)", border:"none", borderRadius:8, color:"white", cursor:"pointer", padding:"6px 14px", fontFamily:FB, fontSize:16, fontWeight:600, lineHeight:1 }}>›</button>
            </div>
            {/* Day headers */}

              ))}
            </div>
            {/* Grid cells */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)" }}>
              {cells.map((day, i) => {
                if (!day) return <div key={i} style={{ minHeight:88, background:"#fafbfc", borderRight:`1px solid ${C.border}`, borderBottom:`1px solid ${C.border}` }} />;
                const events     = byDay[day] || [];
                const isToday    = day===today.day && currentMonth===today.month && currentYear===today.year;
                const isSelected = day===selectedDay;
                const isPast     = (currentYear*10000+currentMonth*100+day) < todaySortKey;
                const hasHearing = events.some(e=>e.type==="Oral Argument"||e.type==="Hearing");
                return (
                  <div key={i}
                    onClick={() => setSelectedDay(day===selectedDay ? null : day)}
                    style={{ minHeight:88, padding:"7px 7px 5px", background:isSelected?"rgba(14,34,64,0.05)":isToday?"#fffef5":"white", borderRight:`1px solid ${C.border}`, borderBottom:`1px solid ${C.border}`, cursor:events.length>0?"pointer":"default", outline:isSelected?`2px solid ${C.navy}`:isToday?`2px solid ${C.gold}`:"none", outlineOffset:-1 }}>
                    <div style={{ fontFamily:FB, fontSize:14, fontWeight:isToday?700:500, color:isPast?C.borderD:isToday?C.gold:C.navy, marginBottom:4, lineHeight:1 }}>
                      {isToday && <span style={{ fontFamily:FB, fontSize:14, fontWeight:800, background:C.gold, color:"white", borderRadius:8, padding:"1px 4px", marginRight:3 }}>TODAY</span>}
                      {day}
                    </div>
                    <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
                      {events.slice(0,3).map((e,ei) => {
                        const isH = e.type==="Oral Argument"||e.type==="Hearing";
                        return (
                          <div key={ei} style={{ background:isH?C.redBr:e.cluster.color, borderRadius:3, padding:"2px 5px", fontFamily:FB, fontSize:14, color:"white", lineHeight:1.3, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", fontWeight:isH?700:500 }}>
                            {isH?"⚖ ":""}{e.case.length>20?e.case.slice(0,20)+"…":e.case}
                          </div>
                        );
                      })}
                      {events.length>3 && <div style={{ fontFamily:FB, fontSize:14, color:C.slateL, paddingLeft:3 }}>+{events.length-3} more</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Selected day detail */}
          {selectedDay && dayDates.length > 0 && (
            <div style={{ marginTop:16, background:C.white, border:`1px solid ${C.border}`, borderRadius:14, overflow:"hidden", boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
              <div style={{ background:C.navy, padding:"12px 18px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <div>
                  <div style={{ fontFamily:FB, fontSize:14, color:"#94a3b8", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:2 }}>Events on</div>
                  <div style={{ fontFamily:FD, fontWeight:700, fontSize:18, color:C.white }}>{MONTH_NAMES[currentMonth]} {selectedDay}, {currentYear}</div>
                </div>
                <div style={{ fontFamily:FD, fontWeight:700, fontSize:24, color:C.gold }}>{dayDates.length} event{dayDates.length!==1?"s":""}</div>
              </div>
              <div style={{ padding:"14px 18px", display:"flex", flexDirection:"column", gap:10 }}>
                {dayDates.map((d,i) => {
                  const isH = d.type==="Oral Argument"||d.type==="Hearing";
                  const tc  = TYPE_COLORS[d.type]||d.cluster.color;
                  return (
                    <div key={i} style={{ display:"flex", gap:14, padding:"12px 14px", background:isH?C.redBrL:d.cluster.bg, borderRadius:10, border:`1px solid ${isH?C.redBrBd:d.cluster.bd}` }}>
                      <div style={{ flexShrink:0 }}>
                        <div style={{ width:36, height:36, borderRadius:"50%", background:isH?C.redBr:d.cluster.color, display:"flex", alignItems:"center", justifyContent:"center" }}>
                          <span style={{ fontSize:16 }}>{isH?"⚖️":"📋"}</span>
                        </div>
                      </div>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontFamily:FD, fontWeight:700, fontSize:15, color:C.navy, marginBottom:4, lineHeight:1.3 }}>{d.case}</div>
                        <div style={{ display:"flex", alignItems:"center", gap:7, flexWrap:"wrap" }}>
                          <span style={{ fontFamily:FB, fontSize:14, fontWeight:700, color:tc, background:tc+"18", padding:"2px 8px", borderRadius:10 }}>{d.type}</span>
                          <span style={{ fontFamily:FB, fontSize:14, color:d.cluster.color, background:d.cluster.bg, padding:"2px 8px", borderRadius:10, border:`1px solid ${d.cluster.bd}`, fontWeight:600 }}>{d.cluster.label}</span>
                          <span style={{ fontFamily:FB, fontSize:14, color:C.slateL }}>{d.issue.label}</span>
                        </div>
                      </div>
                      <button onClick={() => onSelectIssue(d.cluster, d.issue)} style={{ flexShrink:0, background:"transparent", border:`1px solid ${d.cluster.bd}`, borderRadius:8, padding:"5px 10px", color:d.cluster.color, fontFamily:FB, fontSize:14, cursor:"pointer", fontWeight:600, alignSelf:"center" }}>
                        View issue →
                      </button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Legend */}
          <div style={{ marginTop:14, display:"flex", gap:16, flexWrap:"wrap", alignItems:"center" }}>
            <span style={{ fontFamily:FB, fontSize:14, color:C.slateL, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.08em" }}>Event types:</span>
            {[
              { label:"Oral Argument / Hearing", color:C.redBr },
              { label:"Brief / Response / Motion", color:C.blue },
              { label:"Expert Disclosure", color:C.purple },
              { label:"Discovery / Other", color:C.amber },
            ].map((l,i) => (
              <div key={i} style={{ display:"flex", alignItems:"center", gap:5 }}>
                <div style={{ width:10, height:10, borderRadius:2, background:l.color }} />
                <span style={{ fontFamily:FB, fontSize:14, color:C.slate }}>{l.label}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Right: upcoming list */}
        <div style={{ position:"sticky", top:20 }}>
          <div style={{ background:C.white, border:`1px solid ${C.border}`, borderRadius:14, overflow:"hidden", boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
            <div style={{ background:C.navy, padding:"14px 16px" }}>
              <div style={{ fontFamily:FB, fontSize:14, fontWeight:600, letterSpacing:"0.16em", textTransform:"uppercase", color:C.gold, marginBottom:4 }}>Chronological</div>
              <div style={{ fontFamily:FD, fontWeight:700, fontSize:18, color:C.white, lineHeight:1 }}>Upcoming Deadlines</div>
              <div style={{ fontFamily:FB, fontSize:14, color:"#94a3b8", marginTop:4 }}>Click any date to highlight on calendar</div>
            </div>
            <div style={{ maxHeight:700, overflowY:"auto", padding:"6px 0" }}>
              {(() => {
                let lastMonth = null;
                return upcoming.map((d, i) => {
                  const isH = d.type==="Oral Argument"||d.type==="Hearing";
                  const tc  = TYPE_COLORS[d.type]||d.cluster.color;
                  const mLabel = `${MONTH_SHORT[d.month]} ${d.year}`;
                  const showHdr = mLabel !== lastMonth;
                  lastMonth = mLabel;
                  return (
                    <div key={i}>
                      {showHdr && (
                        <div style={{ padding:"8px 16px 4px", fontFamily:FB, fontSize:14, fontWeight:700, color:C.slateL, textTransform:"uppercase", letterSpacing:"0.1em", borderTop:i>0?`1px solid ${C.smoke}`:"none", marginTop:i>0?4:0 }}>{mLabel}</div>
                      )}
                      <div onClick={() => { setCurrentMonth(d.month); setCurrentYear(d.year); setSelectedDay(d.day); }}
                        style={{ display:"flex", alignItems:"flex-start", gap:10, padding:"9px 16px", cursor:"pointer", borderLeft:`3px solid ${isH?C.redBr:d.cluster.color}`, marginLeft:4, marginBottom:1 }}
                        onMouseEnter={e => e.currentTarget.style.background=C.smoke}
                        onMouseLeave={e => e.currentTarget.style.background="transparent"}>
                        <div style={{ flexShrink:0, textAlign:"center", minWidth:30 }}>
                          <div style={{ fontFamily:FD, fontWeight:700, fontSize:17, color:isH?C.redBr:d.cluster.color, lineHeight:1 }}>{d.day}</div>
                          <div style={{ fontFamily:FB, fontSize:14, color:C.slateL, lineHeight:1, marginTop:1 }}>{MONTH_SHORT[d.month]}</div>
                        </div>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontFamily:FB, fontSize:14, color:C.navy, fontWeight:500, lineHeight:1.3, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{d.case}</div>
                          <div style={{ display:"flex", alignItems:"center", gap:5, marginTop:3, flexWrap:"wrap" }}>
                            <span style={{ fontFamily:FB, fontSize:14, color:tc, background:tc+"18", padding:"1px 6px", borderRadius:8, fontWeight:700 }}>{d.type}</span>
                            <span style={{ fontFamily:FB, fontSize:14, color:d.cluster.color, fontWeight:600 }}>{d.cluster.label}</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                });
              })()}
              {upcoming.length===0 && (
                <div style={{ padding:"24px 16px", textAlign:"center", fontFamily:FB, fontSize:14, color:C.slateL }}>No upcoming dates match the current filter.</div>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function Dashboard() {
  const [view, setView]                         = useState("overview");
  const [selectedCluster, setSelectedCluster]   = useState(null);
  const [selectedIssue,   setSelectedIssue]     = useState(null);

  function selectIssue(cluster, issue) {
    setSelectedCluster(cluster);
    setSelectedIssue(issue);
    setView("issue");
  }

  function goOverview() { setView("overview"); setSelectedCluster(null); setSelectedIssue(null); }
  function goCalendar() { setView("calendar"); setSelectedCluster(null); setSelectedIssue(null); }

  return (
    <div style={{ background:C.smoke, minHeight:"100vh", fontFamily:FB }}>
      {/* Header */}
      <div style={{ background:C.navy, padding:"0 32px" }}>
        <div style={{ maxWidth:1200, margin:"0 auto" }}>
          <div style={{ display:"flex", alignItems:"flex-end", justifyContent:"space-between", paddingTop:20 }}>
            <div>
              <div style={{ fontFamily:FB, fontSize:14, fontWeight:600, letterSpacing:"0.2em", textTransform:"uppercase", color:C.gold, marginBottom:6 }}>O'Neill Institute · Georgetown Law</div>
              <div style={{ display:"flex", alignItems:"baseline", gap:14 }}>
                <h1 style={{ fontFamily:FD, fontWeight:700, fontSize:24, color:C.white, margin:0, lineHeight:1.1 }}>Health Care Litigation Tracker</h1>
                <span style={{ fontFamily:FD, fontWeight:400, fontSize:16, color:"#94a3b8", fontStyle:"italic" }}>Trends Intelligence</span>
              </div>
            </div>
          </div>
          {/* Breadcrumb */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", paddingTop:14 }}>
            {/* Left: issue trail */}
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <button onClick={goOverview} style={{ fontFamily:FB, fontSize:14, color:view==="overview"?C.white:"#94a3b8", background:"transparent", border:"none", cursor:"pointer", padding:"8px 0", borderBottom:view==="overview"?`2px solid ${C.gold}`:"2px solid transparent", fontWeight:view==="overview"?600:400 }}>
                All Issues
              </button>
              {selectedCluster && (
                <>
                  <span style={{ color:"#94a3b8", fontSize:14 }}>/</span>
                  <button onClick={goOverview} style={{ fontFamily:FB, fontSize:14, color:"#94a3b8", background:"transparent", border:"none", cursor:"pointer", padding:"8px 0", borderBottom:"2px solid transparent" }}>{selectedCluster.label}</button>
                </>
              )}
              {selectedIssue && (
                <>
                  <span style={{ color:"#94a3b8", fontSize:14 }}>/</span>
                  <span style={{ fontFamily:FB, fontSize:14, color:C.white, padding:"8px 0", borderBottom:`2px solid ${C.gold}`, fontWeight:600 }}>{selectedIssue.label}</span>
                </>
              )}
            </div>
            {/* Right: Key Dates tab — always visible */}
            <button onClick={goCalendar} style={{ fontFamily:FB, fontSize:14, fontWeight:600, color:view==="calendar"?C.navy:C.white, background:view==="calendar"?C.gold:"rgba(255,255,255,0.12)", border:`1px solid ${view==="calendar"?C.gold:"rgba(255,255,255,0.2)"}`, cursor:"pointer", padding:"7px 14px", borderRadius:8, display:"flex", alignItems:"center", gap:6, flexShrink:0, transition:"all 0.15s" }}
              onMouseEnter={e => { if(view!=="calendar"){ e.currentTarget.style.background="rgba(255,255,255,0.22)"; e.currentTarget.style.borderColor="rgba(255,255,255,0.4)"; }}}
              onMouseLeave={e => { if(view!=="calendar"){ e.currentTarget.style.background="rgba(255,255,255,0.12)"; e.currentTarget.style.borderColor="rgba(255,255,255,0.2)"; }}}>
              📅 Key Dates
            </button>
          </div>
        </div>
      </div>

      {/* Main issue nav */}
      {(() => {
        const allIssueNav = ISSUE_CLUSTERS.flatMap(c => c.issues.map(i => ({ ...i, cluster:c })))
          .sort((a,b) => b.total - a.total);
        const top6 = allIssueNav.slice(0, 6);
        const rest  = allIssueNav.slice(6);
        const [dropOpen, setDropOpen] = useState(false);
        const activeId = view === "issue" && selectedIssue ? selectedIssue.id : null;

        return (
          <div style={{ background:C.white, borderBottom:`1px solid ${C.border}`, boxShadow:"0 2px 8px rgba(0,0,0,0.06)", position:"relative", zIndex:20 }}>
            <div style={{ maxWidth:1200, margin:"0 auto", padding:"0 32px", display:"flex", alignItems:"stretch", gap:4 }}>
              {top6.map(i => {
                const isActive = i.id === activeId;
                return (
                  <button key={i.id} onClick={() => selectIssue(i.cluster, i)}
                    style={{
                      fontFamily:FB, fontSize:14, fontWeight:isActive ? 700 : 500,
                      padding:"0 18px", height:56, border:"none",
                      borderBottom:`4px solid ${isActive ? i.cluster.color : "transparent"}`,
                      borderTop:"4px solid transparent",
                      background: isActive ? i.cluster.bg : "transparent",
                      color: isActive ? i.cluster.color : C.slate,
                      cursor:"pointer", whiteSpace:"nowrap", transition:"all 0.15s",
                      display:"flex", flexDirection:"column", alignItems:"flex-start", justifyContent:"center", gap:2,
                    }}
                    onMouseEnter={e => { if (!isActive) { e.currentTarget.style.color = i.cluster.color; e.currentTarget.style.background = i.cluster.bg + "88"; e.currentTarget.style.borderBottomColor = i.cluster.color + "55"; }}}
                    onMouseLeave={e => { if (!isActive) { e.currentTarget.style.color = C.slate; e.currentTarget.style.background = "transparent"; e.currentTarget.style.borderBottomColor = "transparent"; }}}>
                    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                      <span style={{ width:8, height:8, borderRadius:"50%", background:i.cluster.color, flexShrink:0, display:"inline-block", boxShadow: isActive ? `0 0 0 2px ${i.cluster.color}30` : "none" }}/>
                      <span style={{ lineHeight:1 }}>{i.label}</span>
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:6, paddingLeft:14 }}>
                      <span style={{ fontFamily:FB, fontSize:14, color: isActive ? i.cluster.color : C.slateL, opacity:.8, fontWeight:400 }}>{i.cluster.label}</span>
                      <span style={{ fontFamily:FD, fontWeight:700, fontSize:14, color: isActive ? i.cluster.color : C.borderD }}>{i.total}</span>
                    </div>
                  </button>
                );
              })}

              {/* Divider */}
              <div style={{ width:1, background:C.border, margin:"12px 8px", flexShrink:0 }}/>

              {/* More issues dropdown */}
              {rest.length > 0 && (
                <div style={{ position:"relative", display:"flex", alignItems:"center" }}>
                  <button
                    onClick={() => setDropOpen(o => !o)}
                    style={{ fontFamily:FB, fontSize:14, fontWeight:600, height:56, padding:"0 16px", border:"none",
                             borderBottom:`4px solid ${dropOpen ? C.gold : "transparent"}`,
                             borderTop:"4px solid transparent",
                             background: dropOpen ? C.goldL : "transparent",
                             color: dropOpen ? C.amber : C.navy,
                             cursor:"pointer", display:"flex", alignItems:"center", gap:7,
                             whiteSpace:"nowrap", transition:"all 0.15s" }}
                    onMouseEnter={e => { e.currentTarget.style.background = C.goldL; e.currentTarget.style.color = C.amber; }}
                    onMouseLeave={e => { if (!dropOpen) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = C.navy; }}}>
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <line x1="2" y1="4" x2="12" y2="4"/><line x1="2" y1="7" x2="12" y2="7"/><line x1="2" y1="10" x2="9" y2="10"/>
                    </svg>
                    More issues
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"
                         style={{ transform: dropOpen ? "rotate(180deg)" : "rotate(0)", transition:"transform 0.2s" }}>
                      <polyline points="2 4 6 8 10 4"/>
                    </svg>
                  </button>

                  {dropOpen && (
                    <>
                      <div style={{ position:"fixed", inset:0, zIndex:10 }} onClick={() => setDropOpen(false)}/>
                      <div style={{ position:"absolute", left:0, top:"calc(100% + 4px)", background:C.white, border:`1px solid ${C.border}`, borderRadius:12, boxShadow:"0 12px 32px rgba(0,0,0,0.14)", minWidth:280, zIndex:30, overflow:"hidden" }}>
                        <div style={{ padding:"10px 16px 8px", borderBottom:`1px solid ${C.smoke}` }}>
                          <div style={{ fontFamily:FB, fontSize:14, fontWeight:600, letterSpacing:"0.12em", textTransform:"uppercase", color:C.slateL }}>All issue areas</div>
                        </div>
                        {ISSUE_CLUSTERS.filter(c => c.issues.some(i => rest.find(r => r.id === i.id))).map(cluster => {
                          const clusterRest = rest.filter(r => r.cluster.id === cluster.id);
                          if (!clusterRest.length) return null;
                          return (
                            <div key={cluster.id}>
                              <div style={{ padding:"8px 16px 4px", fontFamily:FB, fontSize:14, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color:cluster.color, background:cluster.bg }}>
                                {cluster.label}
                              </div>
                              {clusterRest.map(i => (
                                <button key={i.id} onClick={() => { selectIssue(i.cluster, i); setDropOpen(false); }}
                                  style={{ display:"flex", alignItems:"center", justifyContent:"space-between", width:"100%", padding:"10px 16px", border:"none", background:"transparent", cursor:"pointer", fontFamily:FB, fontSize:14, color:C.navy, textAlign:"left", gap:8, transition:"background 0.1s" }}
                                  onMouseEnter={e => e.currentTarget.style.background = cluster.bg}
                                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                                    <span style={{ width:8, height:8, borderRadius:"50%", background:cluster.color, flexShrink:0, display:"inline-block" }}/>
                                    <span style={{ fontWeight:500 }}>{i.label}</span>
                                  </div>
                                  <span style={{ fontFamily:FD, fontWeight:700, fontSize:14, color:cluster.color, flexShrink:0 }}>{i.total}</span>
                                </button>
                              ))}
                            </div>
                          );
                        })}
                        <div style={{ padding:"10px 16px", borderTop:`1px solid ${C.smoke}`, background:C.smoke }}>
                          <a href={BASE + "/issues"} target="_blank" rel="noopener noreferrer"
                             style={{ fontFamily:FB, fontSize:14, color:C.slateL, textDecoration:"none", display:"flex", alignItems:"center", gap:5 }}
                             onMouseEnter={e => e.currentTarget.style.color = C.navy}
                             onMouseLeave={e => e.currentTarget.style.color = C.slateL}>
                            View all issues on live tracker ↗
                          </a>
                        </div>
                      </div>
                    </>
                  )}
                </div>
              )}
            </div>
          </div>
        );
      })()}

      {/* Issue sub-header — shown when drilling into an issue */}
      {view === "issue" && selectedIssue && selectedCluster && (
        <div style={{ background:C.white, borderBottom:`1px solid ${C.border}`, padding:"14px 32px" }}>
          <div style={{ maxWidth:1200, margin:"0 auto", display:"flex", alignItems:"center", gap:16 }}>
            <div style={{ flex:1 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:6 }}>
                <span style={{ fontFamily:FB, fontSize:14, fontWeight:600, letterSpacing:"0.12em", textTransform:"uppercase", color:selectedCluster.color, background:selectedCluster.bg, padding:"3px 10px", borderRadius:20 }}>{selectedCluster.label}</span>
                <span style={{ fontSize:14 }}>{STATUS_CONFIG[selectedIssue.policyStatus] ? STATUS_CONFIG[selectedIssue.policyStatus].icon : ""}</span>
              </div>
              <div style={{ fontFamily:FD, fontWeight:700, fontSize:22, color:C.navy, lineHeight:1 }}>{selectedIssue.label}</div>
            </div>
            <div style={{ display:"flex", gap:12 }}>
              {[
                { n:selectedIssue.total,                                    l:"Total cases", color:selectedCluster.color, bg:selectedCluster.bg,  bd:selectedCluster.bd  },
                { n:selectedIssue.appellate,                                l:"Appellate",   color:C.purple,              bg:C.purpleL,            bd:C.purpleBd          },
                { n:selectedIssue.district,                                 l:"District",    color:C.blue,                bg:C.blueL,              bd:C.blueBd            },
                { n:selectedIssue.subTopics ? selectedIssue.subTopics.length : 0, l:"Sub-topics",  color:C.amber,               bg:C.amberL,             bd:C.amberBd           },
              ].map((s, i) => (
                <div key={i} style={{ background:s.bg, border:`1px solid ${s.bd}`, borderRadius:8, padding:"8px 14px", textAlign:"center" }}>
                  <div style={{ fontFamily:FD, fontWeight:700, fontSize:22, color:s.color, lineHeight:1 }}>{s.n}</div>
                  <div style={{ fontFamily:FB, fontSize:14, color:s.color, opacity:.75, marginTop:2 }}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Main content */}
      <div style={{ maxWidth:1200, margin:"0 auto", padding:"24px 32px 60px" }}>
        {view === "overview"  && <LandingOverview onSelect={selectIssue} onCalendar={goCalendar} />}
        {view === "calendar"  && <CalendarPage onSelectIssue={selectIssue} />}
        {view === "issue"     && selectedIssue && <IssueDashboard issue={selectedIssue} clusterColor={selectedCluster.color} />}
      </div>

      <div style={{ maxWidth:1200, margin:"0 auto", padding:"14px 32px 24px", borderTop:`1px solid ${C.border}`, fontFamily:FB, fontSize:14, color:C.slateL }}>
        Georgetown O'Neill Institute for National and Global Health Law · litigationtracker.law.georgetown.edu · March 2026 · Counts estimated from public case archive · Brainstorm prototype
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Dashboard));
</script>
</body>
